<!DOCTYPE html>

<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Uhr">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#000000">
  <link rel="manifest" href='data:application/manifest+json,{"name":"Uhr","short_name":"Uhr","display":"standalone","background_color":"#000000","theme_color":"#000000","orientation":"any","start_url":".","icons":[{"src":"data:image/svg+xml,%3Csvg xmlns='\''http://www.w3.org/2000/svg'\'' viewBox='\''0 0 100 100'\''%3E%3Ccircle cx='\''50'\'' cy='\''50'\'' r='\''50'\'' fill='\''%23000'\''/%3E%3Ccircle cx='\''50'\'' cy='\''50'\'' r='\''42'\'' fill='\''none'\'' stroke='\''%23ff8000'\'' stroke-width='\''6'\''/%3E%3C/svg%3E","sizes":"any","type":"image/svg+xml"}]}'>
  <title>Uhr</title>
  <link href="https://fonts.googleapis.com/css2?family=DIN+Condensed:wght@700&family=Barlow+Condensed:wght@700&family=Roboto+Condensed:wght@700&family=Share+Tech+Mono&display=swap" rel="stylesheet">
  <style>
    :root { color-scheme: dark only; background:#000; }
    *, *::before, *::after {
      margin:0; padding:0; box-sizing:border-box;
      -webkit-tap-highlight-color:transparent;
    }
    html, body {
      width:100%; height:100%; overflow:hidden; background:#000;
      -webkit-user-select:none; user-select:none;
      -webkit-touch-callout:none;
      overscroll-behavior:none;
    }

/* ══════════════════════════════════════════════════
   ROOT
   ══════════════════════════════════════════════════ */
#app {
  position:fixed; top:0; left:0; right:0; bottom:0;
  overflow:hidden; background:#000; color:#fff;
  font-family:'Share Tech Mono', monospace;
  transform:translateZ(0);
  transition:transform 2s ease-in-out;
}

/* ══════════════════════════════════════════════════
   SCREEN — zentriert content-core
   ══════════════════════════════════════════════════ */
.screen {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:none; background:#000;
  overflow:hidden;
}
.screen.active {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding: env(safe-area-inset-top, 0px)
           clamp(6px,1.5vmin,14px)
           env(safe-area-inset-bottom, 0px)
           clamp(6px,1.5vmin,14px);
}
@media (orientation:landscape) {
  .screen.active {
    padding: clamp(20px, 8vh, 60px)
             calc(clamp(16px,4vmin,40px) + env(safe-area-inset-right, 0px))
             env(safe-area-inset-bottom, 0px)
             calc(clamp(16px,4vmin,40px) + env(safe-area-inset-left, 0px));
  }
}

/* ══════════════════════════════════════════════════
   CONTENT-CORE — die kompakte zentrierte Einheit
   Info + Zeit + Balken direkt zusammen
   ══════════════════════════════════════════════════ */
.content-core {
  display:inline-flex;
  flex-direction:column;
  align-items:stretch;
  max-width: 96vw;
}

/* ══════════════════════════════════════════════════
   BUTTONS — absolut, stören Zentrierung nicht
   ══════════════════════════════════════════════════ */
.screen-btns {
  position:absolute;
  bottom: calc(clamp(30px, 6vmin, 50px) + env(safe-area-inset-bottom, 0px));
  left:50%;
  transform:translateX(-50%);
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap: 2.5vmin;
  z-index:100; /* über bar-row::after (z-index 50) */
}
@media (orientation:landscape) {
  .screen-btns {
    bottom: calc(clamp(6px,1.5vmin,14px) + env(safe-area-inset-bottom, 0px));
    right: calc(clamp(8px,2vmin,16px) + env(safe-area-inset-right, 0px));
    left:auto;
    transform:none;
    flex-direction:column;
    align-items:flex-end;
    gap: 1.5vmin;
  }
}

/* ══════════════════════════════════════════════════
   AUTO-HIDE
   ══════════════════════════════════════════════════ */
.btn-ui {
  transition:opacity .8s;
}
body.ui-hidden .btn-ui {
  opacity:0 !important; pointer-events:none !important;
}

/* ══════════════════════════════════════════════════
   INFO-TEXT (Datum / Zielzeit / Alarm)
   Über der Uhrzeit, volle Breite der time-row
   ══════════════════════════════════════════════════ */
.info-text {
  display:block;
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
  color:rgba(255,255,255,.40);
  text-transform:uppercase;
  font-size: clamp(22px, 11vw, 200px);
  line-height: 1.0;
  height: clamp(40px, calc(11vw + 9vmin), 220px);
  overflow: hidden;
  text-align: justify;
  text-align-last: justify;
}
.info-text.accent {
  color:rgba(255,128,0,.85);
  text-align:right;
  text-align-last:right;
}
@media (orientation:landscape) {
  .info-text {
    display:none !important;
  }
}

/* Landscape-only Info-Elemente */
.landscape-info {
  display:none;
}
@media (orientation:landscape) {
  .landscape-info {
    display:block;
    position:absolute;
    right: calc(clamp(18px, 4vmin, 44px) + env(safe-area-inset-right, 0px));
    top: calc(clamp(12px, 3vmin, 28px) + env(safe-area-inset-top, 0px));
    text-align:right;
    font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
    color:rgba(255,128,0,.85);
    font-size: clamp(12px, min(3vw, 5vh), 80px);
    z-index:5;
    pointer-events:none;
  }
}

/* ══════════════════════════════════════════════════
   LANDSCAPE DATE BLOCK
   ══════════════════════════════════════════════════ */
#dateLandscape {
  display:none;
}
@media (orientation:landscape) {
  #dateLandscape {
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    position:absolute;
    right: calc(clamp(16px, 3vmin, 36px) + env(safe-area-inset-right, 0px));
    top: calc(clamp(18px, 5vmin, 52px) + env(safe-area-inset-top, 0px));
    text-align:right;
    z-index:5;
    gap: clamp(2px, 0.5vh, 12px);
  }
}
.dl-day {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700;
  color:rgba(255,255,255,.28);
  letter-spacing:.30em;
  text-transform:uppercase;
  font-size: clamp(10px, min(1.8vw, 3.5vh), 50px);
  line-height:1;
  margin-bottom: clamp(4px, 1vh, 24px);
}
.dl-date {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700;
  color:rgba(255,255,255,.45);
  line-height:0.85;
  font-size: clamp(40px, min(7vw, 18vh), 300px);
}
.dl-month {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700;
  color:rgba(255,128,0,.6);
  text-transform:uppercase;
  letter-spacing:.18em;
  line-height:1;
  font-size: clamp(13px, min(2.5vw, 5.5vh), 80px);
}
.dl-year {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700;
  color:rgba(255,255,255,.18);
  letter-spacing:.18em;
  line-height:1;
  font-size: clamp(13px, min(2.5vw, 5.5vh), 80px);
}

/* ══════════════════════════════════════════════════
   TIME-ROW
   ══════════════════════════════════════════════════ */
.time-row {
  display:flex;
  align-items:baseline;
}
.time-main {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700; letter-spacing:-0.02em;
  line-height:0.92; color:#fff; white-space:nowrap;
  font-size: clamp(44px, min(34vw, 34vh), 2000px);
  font-variant-numeric: tabular-nums;
}
.time-sec {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,.52);
  line-height:0.92; white-space:nowrap;
  font-size: clamp(18px, min(17vw, 17vh), 1000px);
  padding-left: clamp(2px, min(1.5vw, 2vh), 40px);
  width: 2.2ch;
  text-align: center;
  font-variant-numeric: tabular-nums;
}
@media (orientation:landscape) {
  .time-main {
    font-size: clamp(44px, min(36vw, 64vh), 2000px);
  }
  .time-sec {
    font-size: clamp(18px, min(18vw, 32vh), 1000px);
    padding-left: clamp(4px, min(1.5vw, 3vh), 60px);
  }
}

/* Idle-State (Wecker) — Farbe identisch mit normaler Anzeige */
.time-main.idle { color:#fff; }
.time-sec.idle  { color:rgba(255,255,255,.52); }

/* ══════════════════════════════════════════════════
   COUNTDOWN & WECKER — größere Ziffern
   Portrait: so groß wie ohne Überlauf möglich
   Landscape: kleiner, damit Buttons nicht überlappt werden
   ══════════════════════════════════════════════════ */
#countdown-screen .time-main,
#wecker-screen    .time-main {
  font-size: clamp(44px, min(41vw, 58vh), 2000px);
}
#countdown-screen .time-sec,
#wecker-screen    .time-sec {
  font-size: clamp(18px, min(20vw, 29vh), 1000px);
}
@media (orientation:landscape) {
  #countdown-screen .time-main,
  #wecker-screen    .time-main {
    font-size: clamp(44px, min(36vw, 40vh), 2000px);
  }
  #countdown-screen .time-sec,
  #wecker-screen    .time-sec {
    font-size: clamp(18px, min(18vw, 20vh), 1000px);
    padding-left: clamp(4px, min(1.5vw, 3vh), 60px);
  }
}

/* ══════════════════════════════════════════════════
   ZEN-MODUS — alles außer Ziffern ausblenden wenn Timer läuft
   ══════════════════════════════════════════════════ */
.zen-ui {
  transition: opacity .8s;
}
body.ui-hidden #countdown-screen.screen-running .zen-ui,
body.ui-hidden #wecker-screen.screen-running    .zen-ui {
  opacity: 0 !important;
  pointer-events: none !important;
}

/* ══════════════════════════════════════════════════
   SCREEN LABEL — "COUNTDOWN" / "WECKER"
   ══════════════════════════════════════════════════ */
.screen-label {
  position:absolute;
  top: calc(clamp(8px, 2vmin, 16px) + env(safe-area-inset-top, 0px));
  left:50%; transform:translateX(-50%);
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif;
  font-weight:700;
  color:rgba(255,128,0,.28);
  letter-spacing:.45em;
  text-transform:uppercase;
  font-size:clamp(10px, 2.2vmin, 15px);
  padding-right:.45em; /* Ausgleich letter-spacing */
  pointer-events:none;
  z-index:5;
  white-space:nowrap;
}

/* ══════════════════════════════════════════════════
   FLASH OVERLAY — Bildschirmblinken bei Alarm
   ══════════════════════════════════════════════════ */
#flashOverlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:290; pointer-events:none;
  background:transparent;
}
@keyframes screenflash {
  0%  { background:transparent; }
  15% { background:rgba(210,45,0,.65); }
  100%{ background:transparent; }
}

/* ══════════════════════════════════════════════════
   BAR-ROW
   ══════════════════════════════════════════════════ */
.bar-row {
  display:flex;
  align-items:center;
  gap: 1.5vmin;
  padding-top: clamp(3px, 0.6vmin, 20px);
  position:relative;
}
.bar-row::after {
  content:'';
  position:absolute;
  left:0; right:0;
  top:100%;
  height: clamp(30px, 8vmin, 120px);
  background:#000;
  z-index:50;
  pointer-events:none;
}
.sc-bar-track {
  flex:1;
  height: clamp(14px, 4.2vmin, 60px);
  background: rgba(255,255,255,.07);
  border-radius: 6px;
  position: relative;
  clip-path: inset(0 round 6px);
}
.bar-marker {
  width:2px; height: clamp(12px, 5vmin, 60px);
  background:rgba(255,255,255,.32); border-radius:1px;
  flex-shrink:0;
}
.bar-fill {
  position:absolute; top:0; left:0; bottom:0; width:0%;
  background:#ff8000;
  box-shadow:0 0 10px #ff8000, 0 0 28px rgba(255,128,0,.7), 0 0 50px rgba(255,128,0,.3);
  border-radius:6px;
  pointer-events:none;
}
.bar-fill-reverse {
  position:absolute; top:0; right:0; bottom:0; width:0%;
  background:#ff8000;
  box-shadow:0 0 10px #ff8000, 0 0 28px rgba(255,128,0,.7), 0 0 50px rgba(255,128,0,.3);
  border-radius:6px;
  pointer-events:none;
}

/* ══════════════════════════════════════════════════
   BUTTONS
   ══════════════════════════════════════════════════ */
.act-btn {
  font-family:'Share Tech Mono',monospace;
  letter-spacing:.15em; text-transform:uppercase;
  border-radius:4vmin; cursor:pointer; border:none; text-align:center;
  font-size:clamp(9px, 2vmin, 14px);
  padding:clamp(5px, 1.4vmin, 11px) clamp(10px, 2.8vmin, 22px);
  white-space:nowrap;
}
.act-go    { background:#ff8000; color:#000; box-shadow:0 0 14px rgba(255,128,0,.5); }
.act-reset { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2); color:#fff; }
.act-set   { background:rgba(255,128,0,.14); border:1px solid rgba(255,128,0,.5); color:#ff8000; }
.act-set.armed { background:#ff8000; color:#000; }

.wl-toggle {
  background:rgba(255,128,0,.12); border:1px solid rgba(255,128,0,.4);
  color:rgba(255,128,0,.6);
  transition:background .3s, color .3s, border-color .3s;
}
.wl-toggle.on {
  background:rgba(255,128,0,.88); border-color:#ff8000; color:#000;
}

.act-notify {
  background:rgba(255,128,0,.14); border:1px solid rgba(255,128,0,.5);
  color:#ff8000;
  transition:background .3s, color .3s, border-color .3s;
}
.act-notify.vib {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.28);
  color:rgba(255,255,255,.6);
}
.act-notify.sil {
  background:transparent; border:1px solid rgba(255,255,255,.12);
  color:rgba(255,255,255,.25);
}

.info-msg {
  color:#ff8000; letter-spacing:.15em; text-transform:uppercase;
  text-align:center; font-size:clamp(7px, 1.8vmin, 13px);
  font-family:'Share Tech Mono',monospace;
  animation:pulse 1s ease-in-out infinite alternate;
}
.info-msg.hidden { display:none; }
@keyframes pulse { from{opacity:.2} to{opacity:1} }

/* ══════════════════════════════════════════════════
   DOTS
   ══════════════════════════════════════════════════ */
#dots {
  position:absolute;
  z-index:200; pointer-events:auto;
  display:flex;
  flex-direction:row;
  align-items:center;
  gap:clamp(8px, 2.5vmin, 20px);
  bottom: calc(clamp(10px, 2vmin, 18px) + env(safe-area-inset-bottom, 0px));
  left:50%;
  transform:translateX(-50%);
}
@media (orientation:portrait) {
  #dots {
    bottom: calc(clamp(10px, 2vmin, 18px) + env(safe-area-inset-bottom, 0px));
    left:50%;
    top:auto; right:auto;
    transform:translateX(-50%);
    flex-direction:row;
  }
}
@media (orientation:landscape) {
  #dots {
    left: calc(clamp(8px, 2vmin, 16px) + env(safe-area-inset-left, 0px));
    top:50%;
    bottom:auto; right:auto;
    transform:translateY(-50%);
    flex-direction:column;
  }
}
.dot {
  width:clamp(8px, 1.5vmin, 12px); height:clamp(8px, 1.5vmin, 12px);
  border-radius:50%; background:rgba(255,255,255,.45); cursor:pointer;
  flex-shrink:0;
  transition:background .3s, box-shadow .3s;
}
.dot-hitarea {
  padding:clamp(6px, 1.5vmin, 14px);
  cursor:pointer;
}
.dot.active {
  background:#ff8000;
  box-shadow:0 0 8px #ff8000, 0 0 16px rgba(255,128,0,.5);
}

/* ══════════════════════════════════════════════════
   FULLSCREEN
   ══════════════════════════════════════════════════ */
#fsBtn {
  display:none; position:absolute; bottom:14px; left:14px;
  width:44px; height:44px; background:rgba(255,128,0,.18);
  border:1px solid rgba(255,128,0,.5); color:#ff8000;
  font-size:22px; border-radius:10px; cursor:pointer; z-index:999;
  align-items:center;
  justify-content:center;
  font-family:sans-serif;
}

/* ══════════════════════════════════════════════════
   PICKER MODAL
   ══════════════════════════════════════════════════ */
.picker-modal {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:200;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(0,0,0,.88);
}
.picker-modal.hidden { display:none !important; }
.picker-box {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:5vmin; background:rgb(13,13,13);
  border:1px solid rgba(255,128,0,.28);
  border-radius:4vmin; padding:4vmin 6vmin;
}
.picker-title {
  color:rgba(255,255,255,.40); letter-spacing:.35em;
  text-transform:uppercase; font-size:clamp(12px, 3.5vmin, 22px);
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed','Arial Narrow',sans-serif;
  font-weight:700;
}
.drums-row {
  display:flex;
  align-items:center;
  gap:3vmin;
}
.drum-wrap {
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:1.5vmin;
}
.drum-lbl {
  color:rgba(255,255,255,.22); letter-spacing:.3em;
  text-transform:uppercase; font-size:clamp(7px,1.8vmin,12px);
  font-family:'Share Tech Mono',monospace;
}
.drum-sep {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
  color:rgba(255,128,0,.6); align-self:center;
  margin-bottom:4vmin;
}
.drum-outer { position:relative; overflow:hidden; border-radius:2vmin; }
.drum-hl {
  position:absolute; left:0; right:0; z-index:4; pointer-events:none;
  border-top:1px solid rgba(255,128,0,.7);
  border-bottom:1px solid rgba(255,128,0,.7);
  background:rgba(255,128,0,.09);
}
.drum-fade {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:3; pointer-events:none;
  background:linear-gradient(to bottom,rgb(13,13,13) 0%,rgba(13,13,13,0) 30%,rgba(13,13,13,0) 70%,rgb(13,13,13) 100%);
}
.drum-scroller {
  display:block; overflow-y:scroll; overflow-x:hidden;
  scroll-snap-type:y mandatory;
  scrollbar-width:none;
}
.drum-scroller::-webkit-scrollbar { display:none; }
.drum-item {
  display:flex;
  align-items:center;
  justify-content:center;
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
  color:rgba(255,255,255,.22);
  flex-shrink:0;
  scroll-snap-align:center;
}
.drum-spacer {
  flex-shrink:0;
  scroll-snap-align:none;
}
.picker-ok {
  background:#ff8000; color:#000; border:none; border-radius:2.5vmin;
  font-family:'Share Tech Mono',monospace; letter-spacing:.15em;
  text-transform:uppercase; cursor:pointer;
  padding:1.6vmin 4vmin; font-size:clamp(9px,1.8vmin,13px);
}
.picker-cancel {
  background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15);
  color:rgba(255,255,255,.4); border-radius:2.5vmin;
  font-family:'Share Tech Mono',monospace; letter-spacing:.15em;
  text-transform:uppercase; cursor:pointer;
  padding:1.6vmin 3.5vmin; font-size:clamp(9px,1.8vmin,13px);
}

/* ══════════════════════════════════════════════════
   ALARM OVERLAY
   ══════════════════════════════════════════════════ */
#alarmOverlay {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:300;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:4vmin; cursor:pointer; touch-action:manipulation;
  background:#000;
  animation:ablink .55s ease-in-out infinite;
}
#alarmOverlay.hidden { display:none !important; }
@keyframes ablink { 0%,100%{background:rgba(0,0,0,1)} 50%{background:rgba(210,45,0,.75)} }
.a-title {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
  color:#ff8000; letter-spacing:.5em; text-transform:uppercase;
  font-size:clamp(22px, 9vmin, 72px);
}
.a-time {
  font-family:'DIN Condensed','Barlow Condensed','Roboto Condensed',sans-serif; font-weight:700;
  color:#fff; line-height:1; font-size:clamp(50px, 18vmin, 130px);
}
.a-hint {
  color:rgba(255,255,255,.3); letter-spacing:.3em;
  text-transform:uppercase; font-size:clamp(9px, 2vmin, 14px);
  font-family:'Share Tech Mono',monospace;
}

  </style>
</head>
<body>
<div id="app">

  <!-- ══════════ UHR ══════════ -->

  <div class="screen active" id="uhr-screen">
    <div class="content-core">
      <span class="info-text" id="dateFull">Fr. 20. Mär 2026</span>
      <div class="time-row">

<script>
(function(){
'use strict';

var $ = function(id){ return document.getElementById(id); };
var pad = function(n){ return String(n).padStart(2,'0'); };
function setCdInfoHtml(html){ $('cdInfo').innerHTML = html; $('cdInfoLand').innerHTML = html; }
function setCdInfoText(txt){ $('cdInfo').textContent = txt; $('cdInfoLand').textContent = txt; }
function setWkInfoHtml(html){ $('wkInfo').innerHTML = html; $('wkInfoLand').innerHTML = html; }
function setWkInfoText(txt){ $('wkInfo').textContent = txt; $('wkInfoLand').textContent = txt; }
var DAYS = ['So','Mo','Di','Mi','Do','Fr','Sa'];
var MONS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];
var DAYS_FULL = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONS_FULL = ['Januar','Februar','März','April','Mai','Juni','Juli','August','September','Oktober','November','Dezember'];
var uhrKeepOn = false, wkKeepOn = false, cdWakeLock = false, cdWlOffT = null;

/* ══════════════════════════════════════════════════
   DRUM PICKER ENGINE
   ══════════════════════════════════════════════════ */
var IH = 48, REPS = 21, MID = 10;

function createDrum(scrollId, outerId, hlId, count, initVal){
  var sc = $(scrollId), ou = $(outerId), hl = $(hlId);
  sc.innerHTML = '';
  var ts = document.createElement('div'); ts.className = 'drum-spacer'; sc.appendChild(ts);
  for(var r=0; r<REPS; r++){
    for(var v=0; v<count; v++){
      var el = document.createElement('div');
      el.className = 'drum-item';
      el.textContent = pad(v);
      sc.appendChild(el);
    }
  }
  var bs = document.createElement('div'); bs.className = 'drum-spacer'; sc.appendChild(bs);
  function applySize(){
    var w = Math.round(IH * 2.2);
    ou.style.width = w+'px'; ou.style.height = (IH*3)+'px';
    sc.style.width = w+'px'; sc.style.height = (IH*3)+'px';
    var items = sc.querySelectorAll('.drum-item,.drum-spacer');
    for(var i=0; i<items.length; i++){
      items[i].style.height = IH+'px';
      items[i].style.width = w+'px';
      items[i].style.fontSize = Math.round(IH*0.78)+'px';
    }
    hl.style.top = IH+'px'; hl.style.height = IH+'px';
  }
  function snapTop(v, rep){ return (rep*count+v)*IH; }
  function getVal(){ return ((Math.round(sc.scrollTop/IH)%count)+count)%count; }
  function setVal(v, smooth){
    var sv = ((v%count)+count)%count, t = snapTop(sv, MID);
    if(smooth){ try{ sc.scrollTo({top:t, behavior:'smooth'}); }catch(e){ sc.scrollTop=t; } }
    else{ sc.scrollTop = t; }
  }
  var norm = null;
  sc.addEventListener('scroll', function(){
    clearTimeout(norm);
    norm = setTimeout(function(){
      var v=getVal(), t=snapTop(v,MID);
      if(Math.abs(sc.scrollTop-t)>IH*0.5) sc.scrollTop=t;
    }, 400);
  }, false);
  applySize();
  requestAnimationFrame(function(){ requestAnimationFrame(function(){ sc.scrollTop = snapTop(initVal, MID); }); });
  return { getVal:getVal, setVal:setVal, applySize:applySize };
}

var cdH = createDrum('cdHScroll','cdHOuter','cdHhl', 25, 0);
var cdM = createDrum('cdMScroll','cdMOuter','cdMhl', 60, 5);
var wkH = createDrum('wkHScroll','wkHOuter','wkHhl', 24, 7);
var wkM = createDrum('wkMScroll','wkMOuter','wkMhl', 60, 30);

function updateDrums(){
  var H = $('app').offsetHeight;
  IH = Math.max(38, Math.min(62, Math.round(H*0.08)));
  cdH.applySize(); cdM.applySize(); wkH.applySize(); wkM.applySize();
  var sf = Math.round(IH*0.68);
  [$('cdSep1'),$('cdSep2'),$('wkSep')].forEach(function(e){ if(e) e.style.fontSize=sf+'px'; });
  setTimeout(function(){
    cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false);
    wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false);
  }, 60);
}
window.addEventListener('resize', updateDrums, false);

/* ══════════════════════════════════════════════════
   WAKE LOCK
   ══════════════════════════════════════════════════ */
var wlSentinel = null;
function wlAcquire(){
  if(!navigator.wakeLock || wlSentinel) return;
  navigator.wakeLock.request('screen').then(function(s){
    wlSentinel = s;
    wlSentinel.addEventListener('release', function(){ wlSentinel=null; }, false);
  }).catch(function(){});
}
function wlRelease(){
  if(wlSentinel){ wlSentinel.release().catch(function(){}); wlSentinel=null; }
}
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState==='visible'){
    wlUpdate();
    if(cdState==='running') cdTick();
    if(wkActive && !wkRinging){
      /* Breites 30-Minuten-Fenster beim Aufwachen aus Hintergrund */
      var _n = new Date(), _a = new Date(_n);
      _a.setHours(wkHval, wkMval, 0, 0);
      if(_a > _n) _a.setDate(_a.getDate()-1);
      var _d = _n - _a;
      if(_d >= 0 && _d < 30*60*1000) triggerAlarm();
      else wkTick();
    }
  }
}, false);

/* pagehide — letzter Speicherpunkt bevor iOS die App killt */
window.addEventListener('pagehide', function(){
  if(cdState==='running' && cdEndTime>0){
    try{
      localStorage.setItem('cd_state',   'running');
      localStorage.setItem('cd_endTime', String(cdEndTime));
      localStorage.setItem('cd_total',   String(cdTotal));
      localStorage.setItem('cd_remain',  String(Math.max(0, Math.round((cdEndTime - Date.now()) / 1000))));
    }catch(e){}
  }
  if(wkActive){
    try{
      localStorage.setItem('wk_active',   '1');
      localStorage.setItem('wk_h',        String(wkHval));
      localStorage.setItem('wk_m',        String(wkMval));
      localStorage.setItem('wk_totalSec', String(wkTotalSec));
    }catch(e){}
  }
}, false);

function wlUpdate(){
  var need = uhrKeepOn || cdWakeLock || (wkKeepOn && wkActive);
  if(need) wlAcquire(); else wlRelease();
}

/* ══════════════════════════════════════════════════
   AUTO-HIDE
   ══════════════════════════════════════════════════ */
var hideT;
function showUI(){
  clearTimeout(hideT);
  document.body.classList.remove('ui-hidden');
  hideT = setTimeout(function(){ document.body.classList.add('ui-hidden'); }, 4000);
}
document.addEventListener('mousemove', showUI, false);
document.addEventListener('click', showUI, false);
showUI();

/* ══════════════════════════════════════════════════
   NAVIGATION
   ══════════════════════════════════════════════════ */
var cur = 0, sx = 0, sy = 0, inDrum = false;
$('app').addEventListener('touchstart', function(e){
  sx = e.touches[0].clientX; sy = e.touches[0].clientY;
  inDrum = !!(e.target.closest && e.target.closest('.drum-scroller,.picker-box'));
  showUI();
}, false);
$('app').addEventListener('touchend', function(e){
  if(inDrum) return;
  if(!$('cdModal').classList.contains('hidden') || !$('wkModal').classList.contains('hidden')) return;
  var dx = e.changedTouches[0].clientX - sx;
  var dy = e.changedTouches[0].clientY - sy;
  if(Math.abs(dx) > Math.abs(dy)*1.5 && Math.abs(dx) > 50) goTo(dx<0 ? cur+1 : cur-1);
}, false);

function goTo(i){
  i = ((i%3)+3)%3;
  var ids = ['uhr-screen','countdown-screen','wecker-screen'];
  for(var k=0; k<3; k++){
    if(k===i) $(ids[k]).classList.add('active');
    else $(ids[k]).classList.remove('active');
  }
  var dots = document.querySelectorAll('.dot');
  for(var d=0; d<dots.length; d++){
    if(d===i) dots[d].classList.add('active');
    else dots[d].classList.remove('active');
  }
  cur = i; showUI();
}
document.addEventListener('keydown', function(e){
  if(e.key==='ArrowRight') goTo(cur+1);
  else if(e.key==='ArrowLeft') goTo(cur-1);
  else if(e.key==='Escape'){
    $('cdModal').classList.add('hidden');
    $('wkModal').classList.add('hidden');
    showUI();
  }
}, false);

(function(){
  var hitareas = document.querySelectorAll('.dot-hitarea');
  for(var i=0; i<hitareas.length; i++){
    (function(idx){
      hitareas[idx].addEventListener('click', function(e){
        e.stopPropagation(); goTo(idx);
      }, false);
    })(i);
  }
})();

/* ══════════════════════════════════════════════════
   CLOCK
   ══════════════════════════════════════════════════ */
var lastSec = -1;
function tickClockText(now){
  $('timeMain').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes());
  $('timeSec').textContent = pad(now.getSeconds());
  /* Portrait-Datum (einzeilig) */
  $('dateFull').textContent = DAYS[now.getDay()] + '. ' + pad(now.getDate()) + '. ' + MONS[now.getMonth()] + ' ' + now.getFullYear();
  /* Landscape-Datum (Blockformat) */
  $('dlDay').textContent = DAYS_FULL[now.getDay()];
  $('dlDate').textContent = now.getDate();
  $('dlMonth').textContent = MONS_FULL[now.getMonth()];
  $('dlYear').textContent = now.getFullYear();
}
function tickClockBar(now){
  var p = ((now.getSeconds()*1000 + now.getMilliseconds()) / 60000) * 100;
  $('barFill').style.width = p + '%';
}

/* ══════════════════════════════════════════════════
   NOTIFY MODE — Lautlos / Vibration / Sound
   ══════════════════════════════════════════════════ */
var notifyMode = 'sound';
try{ var _nm = localStorage.getItem('notifyMode'); if(_nm==='vibration'||_nm==='silent') notifyMode=_nm; }catch(e){}

function applyNotifyMode(){
  var label = notifyMode==='sound' ? '♪ Sound' : notifyMode==='vibration' ? '≋ Vibration' : '– Lautlos';
  ['cdNotifyBtn','wkNotifyBtn'].forEach(function(id){
    var btn = $(id); if(!btn) return;
    btn.textContent = label;
    btn.classList.remove('vib','sil');
    if(notifyMode==='vibration') btn.classList.add('vib');
    if(notifyMode==='silent')    btn.classList.add('sil');
  });
  try{ localStorage.setItem('notifyMode', notifyMode); }catch(e){}
}

/* ══════════════════════════════════════════════════
   LOCAL STORAGE — Zustand persistieren
   ══════════════════════════════════════════════════ */
function saveCdState(){
  try{
    localStorage.setItem('cd_state',   cdState);
    localStorage.setItem('cd_endTime', cdEndTime);
    localStorage.setItem('cd_total',   cdTotal);
    localStorage.setItem('cd_remain',  cdRemain);
  }catch(e){}
}
function clearCdState(){
  try{
    ['cd_state','cd_endTime','cd_total','cd_remain'].forEach(function(k){ localStorage.removeItem(k); });
  }catch(e){}
}
function saveWkState(){
  try{
    localStorage.setItem('wk_active',   '1');
    localStorage.setItem('wk_h',        wkHval);
    localStorage.setItem('wk_m',        wkMval);
    localStorage.setItem('wk_totalSec', wkTotalSec);
  }catch(e){}
}
function clearWkState(){
  try{
    ['wk_active','wk_h','wk_m','wk_totalSec'].forEach(function(k){ localStorage.removeItem(k); });
  }catch(e){}
}

/* ══════════════════════════════════════════════════
   COUNTDOWN
   ══════════════════════════════════════════════════ */
var cdTotal=0, cdRemain=0, cdIv=null, cdState='idle', cdEndTime=0;

function cdDisplay(){
  var h = Math.floor(cdRemain/3600), m = Math.floor((cdRemain%3600)/60), s = cdRemain%60;
  $('cdDigits').textContent = pad(h) + ':' + pad(m);
  $('cdSec').textContent = pad(s);
  if(cdRemain > 0){
    var end = new Date(cdEndTime);
    setCdInfoHtml('→&thinsp;' + pad(end.getHours()) + ':' + pad(end.getMinutes()));
  }
}
function cdTick(){
  cdRemain = Math.max(0, Math.round((cdEndTime - Date.now()) / 1000));
  if(cdRemain <= 0){
    clearInterval(cdIv); cdIv = null; cdState = 'idle'; cdRemain = 0;
    $('countdown-screen').classList.remove('screen-running');
    $('cdDigits').textContent = '00:00';
    $('cdSec').textContent = '00';
    $('cdBarFill').style.width = '0%';
    setCdInfoText('');
    $('cdDone').classList.remove('hidden');
    $('cdGoBtn').textContent = 'Stellen';
    clearTimeout(cdWlOffT);
    cdWlOffT = setTimeout(function(){ cdWakeLock=false; wlUpdate(); }, 5*60*1000);
    clearCdState();
    playAlarmSequence();
    showUI();
    return;
  }
  cdDisplay();
}
function openCdModal(){
  showUI();
  $('cdModal').classList.remove('hidden');
  requestAnimationFrame(function(){
    cdH.setVal(cdH.getVal(), false);
    cdM.setVal(cdM.getVal(), false);
  });
}

$('cdGoBtn').addEventListener('click', function(){
  showUI();
  if(cdState === 'running'){
    clearInterval(cdIv); cdIv = null; cdState = 'paused';
    $('cdGoBtn').textContent = 'Weiter';
    $('countdown-screen').classList.remove('screen-running');
    saveCdState();
  } else if(cdState === 'paused'){
    cdState = 'running';
    $('cdGoBtn').textContent = 'Pause';
    cdEndTime = Date.now() + cdRemain*1000;
    cdIv = setInterval(cdTick, 1000);
    $('countdown-screen').classList.add('screen-running');
    saveCdState();
  } else {
    openCdModal();
  }
}, false);

$('cdResetBtn').addEventListener('click', function(){
  clearInterval(cdIv); cdIv = null;
  cdState = 'idle'; cdTotal = 0; cdRemain = 0; cdEndTime = 0;
  clearTimeout(cdWlOffT); cdWakeLock = false; wlUpdate();
  $('countdown-screen').classList.remove('screen-running');
  $('cdGoBtn').textContent = 'Stellen';
  $('cdDigits').textContent = '00:00';
  $('cdSec').textContent = '00';
  $('cdDone').classList.add('hidden');
  setCdInfoText('');
  $('cdBarFill').style.width = '0%';
  clearCdState();
  showUI();
}, false);

$('cdOk').addEventListener('click', function(){
  setTimeout(function(){
    var h = cdH.getVal(), m = cdM.getVal();
    $('cdModal').classList.add('hidden');
    if(h===0 && m===0) return;
    clearInterval(cdIv); cdIv = null;
    cdTotal = h*3600 + m*60; cdRemain = cdTotal;
    cdState = 'running'; cdEndTime = Date.now() + cdTotal*1000;
    $('cdDone').classList.add('hidden');
    $('cdGoBtn').textContent = 'Pause';
    clearTimeout(cdWlOffT); cdWakeLock = true; wlUpdate();
    $('cdBarFill').style.width = '100%';
    cdIv = setInterval(cdTick, 1000);
    $('countdown-screen').classList.add('screen-running');
    saveCdState();
    showUI();
  }, 150);
}, false);

$('cdCancel').addEventListener('click', function(){
  $('cdModal').classList.add('hidden'); showUI();
}, false);
$('cdModal').addEventListener('click', function(e){
  if(e.target === $('cdModal')){ $('cdModal').classList.add('hidden'); showUI(); }
}, false);

/* ══════════════════════════════════════════════════
   WECKER
   ══════════════════════════════════════════════════ */
var wkActive=false, wkHval=7, wkMval=30, wkTotalSec=0, wkIv=null, wkRinging=false, wkACtx=null, wkSndIv=null;

function secUntilAlarm(h, m){
  var now = new Date(), alarm = new Date(now);
  alarm.setHours(h, m, 0, 0);
  if(alarm <= now) alarm.setDate(alarm.getDate()+1);
  return Math.max(0, Math.round((alarm-now)/1000));
}
function wkDisplay(){
  if(!wkActive){
    $('wkDigits').textContent = '00:00';
    $('wkSec').textContent = '00';
    $('wkBarFill').style.width = '0%';
    return;
  }
  var rem = secUntilAlarm(wkHval, wkMval);
  $('wkDigits').textContent = pad(Math.floor(rem/3600)) + ':' + pad(Math.floor((rem%3600)/60));
  $('wkSec').textContent = pad(rem%60);
}
function wkBeep(vol){
  vol = (vol !== undefined) ? vol : 0.7;
  if(notifyMode === 'silent') return;
  if(notifyMode !== 'vibration'){
    try{
      if(!wkACtx) wkACtx = new (window.AudioContext || window.webkitAudioContext)();
      if(wkACtx.state==='suspended') wkACtx.resume();
      [{f:1047,d:0.00,l:0.11},{f:1047,d:0.16,l:0.11},{f:1047,d:0.32,l:0.11},{f:784,d:0.50,l:0.40}].forEach(function(p){
        var o = wkACtx.createOscillator(), g = wkACtx.createGain();
        o.connect(g); g.connect(wkACtx.destination);
        o.frequency.value = p.f; o.type = 'square';
        var t = wkACtx.currentTime + p.d;
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t+0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t+p.l);
        o.start(t); o.stop(t+p.l+0.02);
      });
    } catch(e){}
  }
  try{ if(navigator.vibrate) navigator.vibrate(300); }catch(e){}
}
function flashScreen(){
  var el = $('flashOverlay');
  el.style.animation = 'none';
  void el.offsetWidth; /* reflow erzwingen */
  el.style.animation = 'screenflash .5s ease-out forwards';
}
function playAlarmSequence(){
  /* 3× Beep in 3-Sekunden-Abständen, crescendo: leise → mittel → laut */
  var vols = [0.22, 0.50, 1.0];
  var i = 0;
  function step(){
    wkBeep(vols[i]); flashScreen();
    i++;
    if(i < vols.length) setTimeout(step, 3000);
  }
  step();
}
function triggerAlarm(){
  if(wkRinging) return;
  wkRinging = true;
  $('alarmTime').textContent = pad(wkHval) + ':' + pad(wkMval);
  $('alarmOverlay').classList.remove('hidden');
  wkBeep(); wkSndIv = setInterval(wkBeep, 1200);
  if(notifyMode !== 'silent'){
    try{ if(navigator.vibrate) navigator.vibrate([500,200,500,200,500]); }catch(e){}
  }
}
function stopAlarm(){
  clearInterval(wkSndIv); wkSndIv = null;
  try{ if(wkACtx){ wkACtx.close(); wkACtx=null; } }catch(e){}
  try{ if(navigator.vibrate) navigator.vibrate(0); }catch(e){}
  $('alarmOverlay').classList.add('hidden');
  wkRinging = false; wkActive = false;
  $('wecker-screen').classList.remove('screen-running');
  clearInterval(wkIv); wkIv = null;
  $('wkSetBtn').textContent = 'Stellen'; $('wkSetBtn').classList.remove('armed');
  setWkInfoText('');
  $('wkDigits').textContent = '00:00';
  $('wkSec').textContent = '00'; $('wkBarFill').style.width = '0%';
  clearWkState();
  wlUpdate(); showUI();
}
function wkTick(){
  if(!wkActive || wkRinging) return;
  var now = new Date();
  var alarmTs = new Date(now);
  alarmTs.setHours(wkHval, wkMval, 0, 0);
  var diff = now - alarmTs;
  if(diff >= 0 && diff < 30000){ triggerAlarm(); return; }
  wkDisplay();
}
function openWkModal(){
  showUI();
  $('wkModal').classList.remove('hidden');
  requestAnimationFrame(function(){
    wkH.setVal(wkH.getVal(), false);
    wkM.setVal(wkM.getVal(), false);
  });
}

$('wkSetBtn').addEventListener('click', function(){
  showUI();
  if(wkActive){ stopAlarm(); return; }
  openWkModal();
}, false);

$('wkResetBtn').addEventListener('click', function(){
  stopAlarm(); $('wkMsg').classList.add('hidden');
}, false);

$('wkOk').addEventListener('click', function(){
  setTimeout(function(){
    var h = wkH.getVal(), m = wkM.getVal();
    $('wkModal').classList.add('hidden');
    var rem = secUntilAlarm(h, m);
    if(rem < 30){
      $('wkMsg').textContent = 'Mind. 1 Min. in der Zukunft!';
      $('wkMsg').classList.remove('hidden');
      return;
    }
    if(wkActive){ clearInterval(wkIv); wkIv=null; wkActive=false; }
    wkHval = h; wkMval = m; wkTotalSec = rem; wkActive = true;
    $('wecker-screen').classList.add('screen-running');
    $('wkSetBtn').textContent = 'Aktiv ✓'; $('wkSetBtn').classList.add('armed');
    setWkInfoHtml('→&thinsp;' + pad(h) + ':' + pad(m));
    $('wkMsg').classList.add('hidden');
    wlUpdate();
    $('wkBarFill').style.width = '100%';
    requestAnimationFrame(function(){ wkDisplay(); });
    wkIv = setInterval(wkTick, 1000);
    saveWkState();
    showUI();
  }, 150);
}, false);

$('wkCancel').addEventListener('click', function(){
  $('wkModal').classList.add('hidden'); showUI();
}, false);
$('wkModal').addEventListener('click', function(e){
  if(e.target === $('wkModal')){ $('wkModal').classList.add('hidden'); showUI(); }
}, false);

$('alarmOverlay').addEventListener('click', stopAlarm, false);
$('alarmOverlay').addEventListener('touchstart', function(e){
  e.preventDefault(); stopAlarm();
}, false);

/* ══════════════════════════════════════════════════
   WAKE LOCK BUTTONS
   ══════════════════════════════════════════════════ */
function initWlBtn(btnId, getState, setState){
  var btn = $(btnId); if(!btn) return;
  function refresh(){
    if(getState()){ btn.classList.add('on'); btn.textContent = '● Anbleiben'; }
    else { btn.classList.remove('on'); btn.textContent = 'Anbleiben'; }
  }
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    setState(!getState()); wlUpdate(); refresh(); showUI();
    try{ localStorage.setItem('uhr_keepOn', uhrKeepOn?'1':'0'); localStorage.setItem('wk_keepOn', wkKeepOn?'1':'0'); }catch(e){}
  }, false);
  refresh();
}
try{ uhrKeepOn = localStorage.getItem('uhr_keepOn')==='1'; wkKeepOn = localStorage.getItem('wk_keepOn')==='1'; }catch(e){}
initWlBtn('uhrWlBtn', function(){ return uhrKeepOn; }, function(v){ uhrKeepOn=v; });
initWlBtn('wkWlBtn',  function(){ return wkKeepOn;  }, function(v){ wkKeepOn=v;  });

['cdNotifyBtn','wkNotifyBtn'].forEach(function(id){
  var btn = $(id); if(!btn) return;
  btn.addEventListener('click', function(e){
    e.stopPropagation();
    notifyMode = notifyMode==='sound' ? 'vibration' : notifyMode==='vibration' ? 'silent' : 'sound';
    applyNotifyMode(); showUI();
  }, false);
});
applyNotifyMode();

/* ══════════════════════════════════════════════════
   FULLSCREEN
   ══════════════════════════════════════════════════ */
(function(){
  var btn = $('fsBtn');
  var canFS = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);
  if(canFS && btn){
    btn.style.display = 'flex';
    var inFS = false;
    btn.addEventListener('click', function(){
      try{
        var el = document.documentElement;
        if(!inFS){
          var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
          if(req) req.call(el);
        } else {
          var ex = document.exitFullscreen || document.webkitExitFullscreen;
          if(ex) ex.call(document);
        }
      }catch(e){}
      showUI();
    }, false);
    function onFSChange(){
      inFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if(inFS){ btn.style.display = 'none'; }
      else { btn.style.display = 'flex'; btn.textContent = '⛶'; }
    }
    document.addEventListener('fullscreenchange', onFSChange, false);
    document.addEventListener('webkitfullscreenchange', onFSChange, false);
  }
})();

/* ══════════════════════════════════════════════════
   RESTORE STATE — beim App-Start wiederherstellen
   ══════════════════════════════════════════════════ */
(function(){
  /* Countdown */
  var cs = localStorage.getItem('cd_state');
  var ce = parseInt(localStorage.getItem('cd_endTime'), 10);
  var ct = parseInt(localStorage.getItem('cd_total'),   10);
  var cr = parseInt(localStorage.getItem('cd_remain'),  10);
  if(cs && cs !== 'idle' && ct > 0){
    cdTotal = ct;
    if(cs === 'running' && ce > 0){
      var rem = Math.max(0, Math.round((ce - Date.now()) / 1000));
      if(rem > 0){
        cdRemain = rem; cdState = 'running'; cdEndTime = ce;
        $('cdGoBtn').textContent = 'Pause';
        $('cdDone').classList.add('hidden');
        cdDisplay();
        cdWakeLock = true; wlUpdate();
        cdIv = setInterval(cdTick, 1000);
        $('countdown-screen').classList.add('screen-running');
      } else {
        $('cdBarFill').style.width = '0%';
        setCdInfoText('');
        $('cdDone').classList.remove('hidden');
        $('cdGoBtn').textContent = 'Stellen';
        clearCdState();
      }
    } else if(cs === 'paused' && cr > 0){
      cdRemain = cr; cdState = 'paused'; cdEndTime = Date.now() + cr*1000;
      $('cdGoBtn').textContent = 'Weiter';
      cdDisplay();
      $('cdBarFill').style.width = (Math.min(1, cr/ct)*100).toFixed(3)+'%';
    }
  }

  /* Wecker */
  if(localStorage.getItem('wk_active') === '1'){
    var wh = parseInt(localStorage.getItem('wk_h'),        10);
    var wm = parseInt(localStorage.getItem('wk_m'),        10);
    var wt = parseInt(localStorage.getItem('wk_totalSec'), 10);
    if(!isNaN(wh) && !isNaN(wm)){
      wkHval = wh; wkMval = wm;
      wkTotalSec = wt || secUntilAlarm(wh, wm);
      var now = new Date(), alarmTs = new Date(now);
      alarmTs.setHours(wh, wm, 0, 0);
      if(alarmTs > now) alarmTs.setDate(alarmTs.getDate() - 1);
      var diff = now - alarmTs;
      wkActive = true;
      if(diff >= 0 && diff < 30*60*1000){
        /* Alarm hat während Abwesenheit ausgelöst (bis 30 Min. Toleranz) */
        wkIv = setInterval(wkTick, 1000);
        triggerAlarm();
      } else {
        $('wecker-screen').classList.add('screen-running');
        $('wkSetBtn').textContent = 'Aktiv ✓'; $('wkSetBtn').classList.add('armed');
        setWkInfoHtml('→&thinsp;' + pad(wh) + ':' + pad(wm));
        wlUpdate();
        $('wkBarFill').style.width = '100%';
        requestAnimationFrame(function(){ wkDisplay(); });
        wkIv = setInterval(wkTick, 1000);
      }
    }
  }
})();

/* ══════════════════════════════════════════════════
   MAIN LOOP — Balken 60fps, Text 1×/Sekunde
   ══════════════════════════════════════════════════ */
updateDrums();

function loop(){
  var now = new Date();
  var sec = now.getSeconds();

  /* Text-Updates nur bei Sekundenwechsel */
  if(sec !== lastSec){
    lastSec = sec;
    tickClockText(now);
  }

  /* Balken immer smooth (60fps) */
  tickClockBar(now);

  if(cdState==='running' && cdTotal>0 && cdEndTime>0){
    var cdFrac = Math.max(0, Math.min(1, (cdEndTime - Date.now()) / (cdTotal*1000)));
    $('cdBarFill').style.width = (cdFrac*100).toFixed(3) + '%';
  }

  if(wkActive && !wkRinging && wkTotalSec>0){
    var wkAlarm = new Date(now);
    wkAlarm.setHours(wkHval, wkMval, 0, 0);
    if(wkAlarm <= now) wkAlarm.setDate(wkAlarm.getDate()+1);
    var wkFrac = Math.max(0, Math.min(1, (wkAlarm-now) / (wkTotalSec*1000)));
    $('wkBarFill').style.width = (wkFrac*100).toFixed(3) + '%';
  }

  requestAnimationFrame(loop);
}
loop();

/* ══════════════════════════════════════════════════
   PIXEL-SHIFT — OLED Einbrennschutz
   ══════════════════════════════════════════════════ */
(function(){
  var app = document.getElementById('app');
  var steps = [-2,-1,0,1,2];
  var lastIdx = -1;
  function pickPos(){
    var idx;
    do { idx = Math.floor(Math.random()*25); } while(idx===lastIdx);
    lastIdx = idx;
    return { x: steps[idx%5], y: steps[Math.floor(idx/5)] };
  }
  function shift(){
    var p = pickPos();
    var v = 'translateZ(0) translate('+p.x+'px,'+p.y+'px)';
    app.style.transform = v;
  }
  setInterval(shift, 73000);
})();

})();
</script>
