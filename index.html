html, body {
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  -webkit-user-select:none; user-select:none;
}

/* ── SINGLE FIXED CONTAINER ── */
#app {
  position: fixed;
  top:0; left:0;
  width:100%; height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:'Share Tech Mono',monospace;
}

/* ── SCREENS (absolute inside #app) ── */
.screen {
  position:absolute;
  top:0; left:0;
  width:100%; height:100%;
  display:none;
  background:#000;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
}
.screen.active {
  display:-webkit-box;
  display:-webkit-flex;
  display:flex;
}
/* Portrait: column layout */
@media (orientation:portrait) {
  .screen.active {
    -webkit-box-orient:vertical;
    -webkit-flex-direction:column;
    flex-direction:column;
  }
}
/* Landscape: row layout with padding so buttons have room */
@media (orientation:landscape) {
  .screen.active {
    -webkit-box-orient:horizontal;
    -webkit-flex-direction:row;
    flex-direction:row;
    gap:20px;
    padding:0 20px;
  }
}

/* ── AUTO-HIDE ── */
.btn-ui { -webkit-transition:opacity .8s; transition:opacity .8s; }
body.ui-hidden .btn-ui { opacity:0 !important; pointer-events:none !important; }

/* ── DOTS ── */
#dots {
  position:absolute; bottom:13px; left:50%;
  -webkit-transform:translateX(-50%); transform:translateX(-50%);
  display:-webkit-flex; display:flex;
  gap:8px; z-index:99; pointer-events:none;
}
.dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,.2); -webkit-transition:all .3s; transition:all .3s; }
.dot.active { background:#ff8000; -webkit-transform:scale(1.35); transform:scale(1.35); }

/* ════════════════════════════════════════
   CLOCK  — all sizes in CSS (instant on rotate)
════════════════════════════════════════ */
#uhr-screen.active { -webkit-flex-direction:column; flex-direction:column; }

.uhr-content {
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
}
.time-row {
  display:-webkit-flex; display:flex;
  -webkit-align-items:flex-end; align-items:flex-end;
}
/* Portrait clock size */
.time-main {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; letter-spacing:-2px; line-height:1; color:#fff; white-space:nowrap;
  font-size: clamp(50px, 20vw, 300px);
}
.time-sec {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,.42); line-height:1; white-space:nowrap;
  font-size:  clamp(18px, 8.6vw, 130px);
  padding-bottom: clamp(3px, 1.7vw, 20px);
  padding-left:   clamp(3px, 1.0vw, 15px);
}
/* Landscape clock size */
@media (orientation:landscape) {
  .time-main { font-size: clamp(50px, 17vh, 190px); }
  .time-sec  { font-size: clamp(18px, 7.3vh, 82px);
               padding-bottom: clamp(3px, 1.5vh, 14px);
               padding-left:   clamp(3px, 0.9vh, 10px); }
}

.date-block {
  display:-webkit-flex; display:flex;
  gap:10px; -webkit-align-items:baseline; align-items:baseline;
  margin-top:6px;
}
.weekday  { color:rgba(255,255,255,.36); letter-spacing:5px; text-transform:uppercase; font-size:clamp(9px, 2.2vw, 20px); }
.date-txt { color:rgba(255,255,255,.48); letter-spacing:2px; font-size:clamp(9px, 2.2vw, 20px); }
@media (orientation:landscape) {
  .weekday  { font-size:clamp(9px, 2.1vh, 18px); }
  .date-txt { font-size:clamp(9px, 2.1vh, 18px); }
}

.progress-bar-wrap {
  margin-top:12px;
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  gap:6px;
  width: min(92vw, 600px);
}
@media (orientation:landscape) {
  .progress-bar-wrap { width: min(55vw, 500px); }
}
.bar-marker { width:2px; height:18px; background:rgba(255,255,255,.32); border-radius:1px; -webkit-flex-shrink:0; flex-shrink:0; }
.bar-track  { flex:1; height:12px; background:rgba(255,255,255,.07); border-radius:6px; position:relative; overflow:hidden; min-width:60px; }
.bar-fill   { position:absolute; top:0; left:0; bottom:0; width:0%; background:#ff8000; box-shadow:0 0 16px #ff8000; border-radius:6px; }
.colon { -webkit-animation:blink 1s step-end infinite; animation:blink 1s step-end infinite; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }
@keyframes blink         { 0%,100%{opacity:1} 50%{opacity:.1} }

/* ════════════════════════════════════════
   RING  — CSS-sized, instant on rotate
   Portrait:  min(86vw, 50vh)
   Landscape: min(78vh, 40vw)   ← capped at 40vw to leave room for buttons
════════════════════════════════════════ */
.ring-wrap {
  position:relative;
  -webkit-flex-shrink:0; flex-shrink:0;
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  /* CSS min() supported Safari 11.3+ */
  width:  min(86vw, 50vh);
  height: min(86vw, 50vh);
}
@media (orientation:landscape) {
  .ring-wrap {
    width:  min(78vh, 40vw);
    height: min(78vh, 40vw);
  }
}
.ring-wrap svg { width:100%; height:100%; -webkit-transform:rotate(-90deg); transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(255,128,0,.12); }
.ring-fg { fill:none; stroke:#ff8000; stroke-linecap:round;
           -webkit-filter:drop-shadow(0 0 10px #ff8000); filter:drop-shadow(0 0 10px #ff8000);
           -webkit-transition:stroke-dashoffset .3s linear; transition:stroke-dashoffset .3s linear; }
.ring-center {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
}

/* Ring text — proportional to ring size via vw/vh
   Portrait ring ≈ 86vw → digits ≈ 0.29*86vw = 24.9vw
   Landscape ring ≈ 78vh → digits ≈ 0.29*78vh = 22.6vh  */
.ring-digits {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:#fff; line-height:1; letter-spacing:-1px; white-space:nowrap;
  font-size: clamp(20px, 24vw, 180px);
}
.ring-sec {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,.55); letter-spacing:2px; margin-top:2px;
  font-size: clamp(9px, 6.5vw, 50px);
}
.ring-label {
  color:rgba(255,255,255,.28); letter-spacing:4px; text-transform:uppercase; margin-top:4px;
  font-family:'Share Tech Mono',monospace;
  font-size: clamp(7px, 3.1vw, 24px);
}
.ring-sub {
  font-family:'DIN Condensed',sans-serif; font-weight:700;
  color:rgba(255,128,0,.78); letter-spacing:3px; margin-top:6px; cursor:pointer;
  font-size: clamp(9px, 4.8vw, 38px);
}
.ring-sublbl {
  color:rgba(255,255,255,.22); letter-spacing:3px; text-transform:uppercase; margin-top:6px; cursor:pointer;
  font-family:'Share Tech Mono',monospace;
  font-size: clamp(7px, 3.0vw, 24px);
}
@media (orientation:landscape) {
  .ring-digits { font-size: clamp(20px, 22vh, 180px); }
  .ring-sec    { font-size: clamp(9px,  6vh,  50px);  }
  .ring-label  { font-size: clamp(7px,  2.9vh, 24px); }
  .ring-sub    { font-size: clamp(9px,  4.4vh, 38px); }
  .ring-sublbl { font-size: clamp(7px,  2.8vh, 24px); }
}

/* ════════════════════════════════════════
   SIDE PANEL  — in normal flex flow (not absolute!)
   Absolute positioning caused cutoff in landscape.
════════════════════════════════════════ */
.side-panel {
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-flex-shrink:0; flex-shrink:0;
}
@media (orientation:portrait)  { .side-panel { gap:10px; margin-top:14px; } }
@media (orientation:landscape) { .side-panel { gap:10px; } }

.act-btn {
  font-family:'Share Tech Mono',monospace; letter-spacing:2px; text-transform:uppercase;
  border-radius:16px; cursor:pointer; border:none;
  font-size: clamp(9px, 1.6vmin, 13px);
  padding: clamp(6px,1.2vmin,10px) clamp(11px,2.4vmin,20px);
}
.act-go    { background:#ff8000; color:#000; box-shadow:0 0 14px rgba(255,128,0,.5); }
.act-reset { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.2); color:#fff; }
.act-set   { background:rgba(255,128,0,.14); border:1px solid rgba(255,128,0,.5); color:#ff8000; }
.act-set.armed { background:#ff8000; color:#000; }
.btn-row { display:-webkit-flex; display:flex; gap:8px; -webkit-align-items:center; align-items:center; }
.info-msg {
  color:#ff8000; letter-spacing:2px; text-transform:uppercase; text-align:center;
  font-size:clamp(8px,1.8vmin,12px); font-family:'Share Tech Mono',monospace;
  -webkit-animation:pulse 1s ease-in-out infinite alternate; animation:pulse 1s ease-in-out infinite alternate;
}
.info-msg.hidden { display:none; }
@-webkit-keyframes pulse { from{opacity:.2} to{opacity:1} }
@keyframes pulse         { from{opacity:.2} to{opacity:1} }

/* ════════════════════════════════════════
   PICKER MODAL
════════════════════════════════════════ */
.picker-modal {
  position:absolute; top:0; left:0; right:0; bottom:0;
  z-index:200;
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  background:rgba(0,0,0,.88);
}
.picker-modal.hidden { display:none !important; }
.picker-box {
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  gap:22px;
  background:rgb(13,13,13); border:1px solid rgba(255,128,0,.28);
  border-radius:22px; padding:28px 34px;
}
.picker-title { color:rgba(255,255,255,.28); letter-spacing:4px; text-transform:uppercase; font-size:10px; font-family:'Share Tech Mono',monospace; }
.drums-row { display:-webkit-flex; display:flex; -webkit-align-items:center; align-items:center; gap:12px; }
.drum-wrap { display:-webkit-flex; display:flex; -webkit-flex-direction:column; flex-direction:column; -webkit-align-items:center; align-items:center; gap:6px; }
.drum-lbl  { color:rgba(255,255,255,.22); letter-spacing:3px; text-transform:uppercase; font-size:9px; font-family:'Share Tech Mono',monospace; }
.drum-sep  { font-family:'DIN Condensed',sans-serif; font-weight:700; color:rgba(255,128,0,.6); -webkit-align-self:center; align-self:center; margin-bottom:18px; }
.drum-outer { position:relative; overflow:hidden; border-radius:10px; }
.drum-hl    { position:absolute; left:0; right:0; z-index:4; pointer-events:none; border-top:1px solid rgba(255,128,0,.7); border-bottom:1px solid rgba(255,128,0,.7); background:rgba(255,128,0,.09); }
.drum-fade  { position:absolute; top:0; left:0; right:0; bottom:0; z-index:3; pointer-events:none;
  background:-webkit-linear-gradient(top, rgb(13,13,13) 0%, rgba(13,13,13,0) 30%, rgba(13,13,13,0) 70%, rgb(13,13,13) 100%);
  background:linear-gradient(to bottom,   rgb(13,13,13) 0%, rgba(13,13,13,0) 30%, rgba(13,13,13,0) 70%, rgb(13,13,13) 100%);
}
.drum-scroller {
  display:block; overflow-y:scroll; overflow-x:hidden;
  -webkit-scroll-snap-type:y mandatory; scroll-snap-type:y mandatory;
  -webkit-overflow-scrolling:touch; scrollbar-width:none;
}
.drum-scroller::-webkit-scrollbar { display:none; }
.drum-item {
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  font-family:'DIN Condensed',sans-serif; font-weight:700;
  color:rgba(255,255,255,.22);
  -webkit-flex-shrink:0; flex-shrink:0;
  -webkit-scroll-snap-align:center; scroll-snap-align:center;
}
.drum-spacer { -webkit-flex-shrink:0; flex-shrink:0; -webkit-scroll-snap-align:none; scroll-snap-align:none; }
.picker-ok     { background:#ff8000; color:#000; border:none; border-radius:14px; font-family:'Share Tech Mono',monospace; letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:10px 26px; font-size:11px; }
.picker-cancel { background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,.15); color:rgba(255,255,255,.4); border-radius:14px; font-family:'Share Tech Mono',monospace; letter-spacing:2px; text-transform:uppercase; cursor:pointer; padding:10px 18px; font-size:11px; }

/* ════════════════════════════════════════
   ALARM
════════════════════════════════════════ */
#alarmOverlay {
  position:absolute; top:0; left:0; right:0; bottom:0; z-index:300;
  display:-webkit-flex; display:flex;
  -webkit-flex-direction:column; flex-direction:column;
  -webkit-align-items:center; align-items:center;
  -webkit-justify-content:center; justify-content:center;
  gap:16px; cursor:pointer; touch-action:manipulation;
  -webkit-animation:ablink .6s ease-in-out infinite; animation:ablink .6s ease-in-out infinite;
}
#alarmOverlay.hidden { display:none !important; }
@-webkit-keyframes ablink { 0%,100%{background:rgba(0,0,0,.97)} 50%{background:rgba(200,40,0,.26)} }
@keyframes ablink         { 0%,100%{background:rgba(0,0,0,.97)} 50%{background:rgba(200,40,0,.26)} }
.a-title { font-family:'DIN Condensed',sans-serif; font-weight:700; color:#ff8000; letter-spacing:5px; text-transform:uppercase; font-size:clamp(28px,9vmin,72px); }
.a-time  { font-family:'DIN Condensed',sans-serif; font-weight:700; color:#fff; line-height:1; font-size:clamp(60px,18vmin,130px); }
.a-hint  { color:rgba(255,255,255,.3); letter-spacing:3px; text-transform:uppercase; font-size:clamp(10px,2vmin,14px); font-family:'Share Tech Mono',monospace; }

<script>
(function(){
'use strict';
var $ = function(id){ return document.getElementById(id); };
var pad = function(n){ return String(n).padStart(2,'0'); };
var CIRC = 2 * Math.PI * 88;
var DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

/* ═══════════════════════════════════
   DRUM ENGINE  —  only JS-sized part
   Everything else is CSS.
═══════════════════════════════════ */
var IH = 48, REPS = 41, MID = 20;

function createDrum(scrollId, outerId, hlId, count, initVal) {
  var sc = $(scrollId), ou = $(outerId), hl = $(hlId);

  sc.innerHTML = '';
  var ts = document.createElement('div'); ts.className='drum-spacer'; sc.appendChild(ts);
  for (var r=0; r<REPS; r++) {
    for (var v=0; v<count; v++) {
      var el = document.createElement('div');
      el.className='drum-item'; el.textContent=pad(v); sc.appendChild(el);
    }
  }
  var bs = document.createElement('div'); bs.className='drum-spacer'; sc.appendChild(bs);

  function applySize() {
    var w = Math.round(IH*2.15);
    ou.style.width=w+'px'; ou.style.height=(IH*3)+'px';
    sc.style.width=w+'px'; sc.style.height=(IH*3)+'px';
    var els=sc.querySelectorAll('.drum-item,.drum-spacer');
    for (var i=0;i<els.length;i++){
      els[i].style.height=IH+'px'; els[i].style.width=w+'px';
      els[i].style.fontSize=Math.round(IH*0.70)+'px';
    }
    hl.style.top=IH+'px'; hl.style.height=IH+'px';
  }

  function snapTop(v,rep){ return (rep*count+v)*IH; }
  function getVal(){ return ((Math.round(sc.scrollTop/IH)%count)+count)%count; }
  function setVal(v,smooth){
    var sv=((v%count)+count)%count, t=snapTop(sv,MID);
    if(smooth){ try{sc.scrollTo({top:t,behavior:'smooth'});}catch(e){sc.scrollTop=t;} }
    else{ sc.scrollTop=t; }
  }

  var normTmr=null;
  sc.addEventListener('scroll',function(){
    clearTimeout(normTmr);
    normTmr=setTimeout(function(){
      var v=getVal();
      if(Math.abs(sc.scrollTop-snapTop(v,MID))>IH*0.5) sc.scrollTop=snapTop(v,MID);
    },400);
  },false);

  applySize();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ sc.scrollTop=snapTop(initVal,MID); });
  });
  return {getVal:getVal, setVal:setVal, applySize:applySize};
}

var cdH=createDrum('cdHScroll','cdHOuter','cdHhl',25,0);
var cdM=createDrum('cdMScroll','cdMOuter','cdMhl',60,5);
var wkH=createDrum('wkHScroll','wkHOuter','wkHhl',24,7);
var wkM=createDrum('wkMScroll','wkMOuter','wkMhl',60,30);

/* ═══════════════════════════════════
   RESIZE  — JS only updates drum sizes.
   All text/ring sizes handled by CSS above → instant on rotate, no flash.

   orientationchange fires BEFORE new viewport on iOS Safari,
   so we fire at t=0, 150, 350 ms to catch whenever it settles.
═══════════════════════════════════ */
function doResize() {
  var H = $('app').offsetHeight;
  IH = Math.max(40, Math.min(64, Math.round(H*0.08)));
  cdH.applySize(); cdM.applySize(); wkH.applySize(); wkM.applySize();
  var sepFs = Math.round(IH*0.70);
  [$('cdSep1'),$('cdSep2'),$('wkSep')].forEach(function(e){ if(e) e.style.fontSize=sepFs+'px'; });
  setTimeout(function(){
    cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false);
    wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false);
  }, 60);
}

window.addEventListener('resize', doResize, false);
window.addEventListener('orientationchange', function(){
  // Fire at multiple times: iOS Safari viewport settles unpredictably
  setTimeout(doResize, 0);
  setTimeout(doResize, 150);
  setTimeout(doResize, 350);
}, false);

/* ═══════════════════════════════════
   AUTO-HIDE
═══════════════════════════════════ */
var hideTimer;
function showUI(){
  clearTimeout(hideTimer);
  document.body.classList.remove('ui-hidden');
  hideTimer=setTimeout(function(){ document.body.classList.add('ui-hidden'); },4000);
}
document.addEventListener('mousemove',showUI,false);
document.addEventListener('click',showUI,false);
showUI();

/* ═══════════════════════════════════
   SWIPE NAVIGATION
═══════════════════════════════════ */
var curScreen=0, sx=0, sy=0, inDrum=false;
var app=$('app');
app.addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX; sy=e.touches[0].clientY;
  inDrum=!!(e.target.closest&&e.target.closest('.drum-scroller,.picker-box'));
  showUI();
},false);
app.addEventListener('touchend',function(e){
  if(inDrum) return;
  if(!$('cdModal').classList.contains('hidden')||!$('wkModal').classList.contains('hidden')) return;
  var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50) goTo(dx<0?curScreen+1:curScreen-1);
},false);

function goTo(i){
  i=((i%3)+3)%3;
  var ids=['uhr-screen','countdown-screen','wecker-screen'];
  for(var k=0;k<3;k++){
    if(k===i) $(ids[k]).classList.add('active');
    else      $(ids[k]).classList.remove('active');
  }
  var dots=document.querySelectorAll('.dot');
  for(var d=0;d<dots.length;d++){
    if(d===i) dots[d].classList.add('active');
    else      dots[d].classList.remove('active');
  }
  curScreen=i; doResize(); showUI();
}

/* ═══════════════════════════════════
   RING HELPER
═══════════════════════════════════ */
function setRing(id,f){ $(id).style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,f))); }
setRing('cdRingFg',1); setRing('wkRingFg',1);

/* ═══════════════════════════════════
   CLOCK
═══════════════════════════════════ */
function tickClock(){
  var now=new Date();
  var p=((now.getSeconds()*1000+now.getMilliseconds())/60000)*100;
  $('timeMain').innerHTML=pad(now.getHours())+'<span class="colon">:</span>'+pad(now.getMinutes());
  $('timeSec').textContent=pad(now.getSeconds());
  $('weekday').textContent=DAYS[now.getDay()];
  $('dateTxt').textContent=pad(now.getDate())+'. '+MONS[now.getMonth()]+' '+now.getFullYear();
  $('barFill').style.width=p+'%';
}

/* ═══════════════════════════════════
   COUNTDOWN
═══════════════════════════════════ */
var cdTotal=0,cdRemain=0,cdIv=null,cdState='idle';

function cdDisplay(){
  var h=Math.floor(cdRemain/3600),m=Math.floor((cdRemain%3600)/60),s=cdRemain%60;
  $('cdDigits').textContent=pad(h)+':'+pad(m);
  $('cdSec').textContent=pad(s);
  if(cdRemain>0){
    var end=new Date(Date.now()+cdRemain*1000);
    $('cdSub').textContent='→ '+pad(end.getHours())+':'+pad(end.getMinutes());
    $('cdSub').classList.remove('hidden');
  }
  setRing('cdRingFg',cdTotal>0?cdRemain/cdTotal:1);
}
function cdTick(){
  if(cdRemain<=0){
    clearInterval(cdIv);cdIv=null;cdState='idle';cdRemain=0;
    cdDisplay();$('cdDone').classList.remove('hidden');
    $('cdGoBtn').textContent='Stellen';$('cdSub').classList.add('hidden');return;
  }
  cdRemain--;cdDisplay();
}
function openCdModal(){
  showUI();$('cdModal').classList.remove('hidden');
  requestAnimationFrame(function(){ cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false); });
}
$('cdGoBtn').addEventListener('click',function(){
  showUI();
  if(cdState==='running'){clearInterval(cdIv);cdIv=null;cdState='paused';$('cdGoBtn').textContent='Weiter';}
  else if(cdState==='paused'){cdState='running';$('cdGoBtn').textContent='Pause';cdIv=setInterval(cdTick,1000);}
  else{openCdModal();}
},false);
$('cdSub').addEventListener('click',openCdModal,false);
$('cdOk').addEventListener('click',function(){
  var h=cdH.getVal(),m=cdM.getVal();
  $('cdModal').classList.add('hidden');
  if(h===0&&m===0) return;
  clearInterval(cdIv);cdIv=null;
  cdTotal=h*3600+m*60;cdRemain=cdTotal;cdState='running';
  $('cdDone').classList.add('hidden');$('cdGoBtn').textContent='Pause';
  cdDisplay();cdIv=setInterval(cdTick,1000);showUI();
},false);
$('cdCancel').addEventListener('click',function(){$('cdModal').classList.add('hidden');showUI();},false);
$('cdModal').addEventListener('click',function(e){if(e.target===$('cdModal')){$('cdModal').classList.add('hidden');showUI();}},false);
$('cdResetBtn').addEventListener('click',function(){
  clearInterval(cdIv);cdIv=null;cdState='idle';cdTotal=0;cdRemain=0;
  $('cdGoBtn').textContent='Stellen';$('cdDigits').textContent='00:00';$('cdSec').textContent='00';
  $('cdDone').classList.add('hidden');$('cdSub').classList.add('hidden');
  setRing('cdRingFg',1);showUI();
},false);

/* ═══════════════════════════════════
   WECKER
═══════════════════════════════════ */
var wkActive=false,wkHval=7,wkMval=30,wkTotalSec=0;
var wkIv=null,wkRinging=false,wkACtx=null,wkSndIv=null;

function secUntilAlarm(h,m){
  var now=new Date(),alarm=new Date(now);
  alarm.setHours(h,m,0,0);
  if(alarm<=now) alarm.setDate(alarm.getDate()+1);
  return Math.max(0,Math.round((alarm-now)/1000));
}
function wkDisplay(){
  if(!wkActive){$('wkDigits').textContent='--:--';$('wkSec').textContent='--';setRing('wkRingFg',1);return;}
  var rem=secUntilAlarm(wkHval,wkMval);
  $('wkDigits').textContent=pad(Math.floor(rem/3600))+':'+pad(Math.floor((rem%3600)/60));
  $('wkSec').textContent=pad(rem%60);
  setRing('wkRingFg',wkTotalSec>0?rem/wkTotalSec:1);
}
function wkBeep(){
  try{
    if(!wkACtx) wkACtx=new(window.AudioContext||window.webkitAudioContext)();
    if(wkACtx.state==='suspended') wkACtx.resume();
    [880,1046,1318].forEach(function(freq,i){
      var o=wkACtx.createOscillator(),g=wkACtx.createGain();
      o.connect(g);g.connect(wkACtx.destination);
      o.frequency.value=freq;o.type='sine';
      var t=wkACtx.currentTime+i*0.14;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.65,t+0.04);
      g.gain.exponentialRampToValueAtTime(0.001,t+0.40);
      o.start(t);o.stop(t+0.44);
    });
  }catch(e){}
}
function triggerAlarm(){
  if(wkRinging) return; wkRinging=true;
  $('alarmTime').textContent=pad(wkHval)+':'+pad(wkMval);
  $('alarmOverlay').classList.remove('hidden');
  wkBeep();wkSndIv=setInterval(wkBeep,900);
  try{if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);}catch(e){}
}
function stopAlarm(){
  clearInterval(wkSndIv);wkSndIv=null;
  try{if(wkACtx){wkACtx.close();wkACtx=null;}}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate(0);}catch(e){}
  $('alarmOverlay').classList.add('hidden');
  wkRinging=false;wkActive=false;
  clearInterval(wkIv);wkIv=null;
  $('wkSetBtn').textContent='Stellen';$('wkSetBtn').classList.remove('armed');
  $('wkSub').textContent='--:--';$('wkDigits').textContent='--:--';$('wkSec').textContent='--';
  setRing('wkRingFg',1);showUI();
}
function wkTick(){
  if(!wkActive||wkRinging) return; wkDisplay();
  var now=new Date();
  if(now.getHours()===wkHval&&now.getMinutes()===wkMval&&now.getSeconds()===0) triggerAlarm();
}
function openWkModal(){
  showUI();$('wkModal').classList.remove('hidden');
  requestAnimationFrame(function(){ wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false); });
}
$('wkLbl').addEventListener('click',openWkModal,false);
$('wkSub').addEventListener('click',openWkModal,false);
$('wkSetBtn').addEventListener('click',function(){showUI();if(wkActive){stopAlarm();return;}openWkModal();},false);
$('wkOk').addEventListener('click',function(){
  setTimeout(function(){
    var h=wkH.getVal(),m=wkM.getVal();
    $('wkModal').classList.add('hidden');
    var rem=secUntilAlarm(h,m);
    if(rem<30){$('wkInfo').textContent='Mind. 1 Min. in der Zukunft!';$('wkInfo').classList.remove('hidden');return;}
    if(wkActive){clearInterval(wkIv);wkIv=null;wkActive=false;}
    wkHval=h;wkMval=m;wkTotalSec=rem;wkActive=true;
    $('wkSetBtn').textContent='Aktiv ✓';$('wkSetBtn').classList.add('armed');
    $('wkSub').textContent=pad(h)+':'+pad(m);
    $('wkInfo').classList.add('hidden');
    wkDisplay();clearInterval(wkIv);wkIv=setInterval(wkTick,1000);showUI();
  },150);
},false);
$('wkCancel').addEventListener('click',function(){$('wkModal').classList.add('hidden');showUI();},false);
$('wkModal').addEventListener('click',function(e){if(e.target===$('wkModal')){$('wkModal').classList.add('hidden');showUI();}},false);
$('wkResetBtn').addEventListener('click',function(){stopAlarm();$('wkInfo').classList.add('hidden');},false);
$('alarmOverlay').addEventListener('click',stopAlarm,false);
$('alarmOverlay').addEventListener('touchstart',function(e){e.preventDefault();stopAlarm();},false);

/* ═══════════════════════════════════
   INIT
═══════════════════════════════════ */
doResize();
function loop(){ tickClock(); requestAnimationFrame(loop); }
loop();

})();
</script>
