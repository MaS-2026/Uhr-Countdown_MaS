/* ══════════════════════════════════════════════════
#app — einziger fixed Root
══════════════════════════════════════════════════ */
#app {
position:fixed; top:0; left:0; right:0; bottom:0;
overflow:hidden; background:#000; color:#fff;
font-family:‘Share Tech Mono’, monospace;
-webkit-transform:translateZ(0); transform:translateZ(0);
}

/* ══════════════════════════════════════════════════
SCREENS
══════════════════════════════════════════════════ */
.screen {
position:absolute; top:0; left:0; right:0; bottom:0;
display:none; background:#000;
}

/* PORTRAIT */
.screen.active {
display:-webkit-flex; display:flex;
-webkit-flex-direction:column; flex-direction:column;
-webkit-justify-content:center; justify-content:center;
}
.sc-main {
/* ── GEÄNDERT: 38vw → 32vw (passend zur neuen font-size 32vw) ── */
position:relative; overflow:visible;
-webkit-flex-shrink:0; flex-shrink:0;
height: calc(32vw + 14vmin);
}

/* LANDSCAPE — überschreibt Portrait-Regeln */
@media (orientation:landscape) {
/* padding-bottom 2vh statt 4vh: Block rückt etwas höher → wirkt mittiger */
.screen.active {
-webkit-justify-content:flex-end; justify-content:flex-end;
padding-bottom: clamp(10px, 2vh, 28px);
}
/* Höhe skaliert mit 25vw-Basis */
.sc-main {
height: calc(min(25vw, 52vh) * 1.4);
-webkit-flex-shrink:0; flex-shrink:0;
overflow:visible;
}
}

.sc-bar-zone {
-webkit-flex-shrink:0; flex-shrink:0;
display:-webkit-flex; display:flex;
-webkit-flex-direction:column; flex-direction:column;
-webkit-align-items:stretch; align-items:stretch;
padding: 0 clamp(8px,1.5vmin,14px)
calc(clamp(8px,2vmin,16px) + env(safe-area-inset-bottom, 0px));
}
@media (orientation:landscape) {
#countdown-screen .sc-bar-zone,
#wecker-screen   .sc-bar-zone {
padding-bottom: calc(clamp(18px, 4.5vmin, 36px) + env(safe-area-inset-bottom, 0px));
}
}

/* Gemeinsamer Balken-Track */
.sc-bar-track {
height: clamp(14px, 4.2vmin, 30px);
background: rgba(255,255,255,.07);
border-radius: 6px;
position: relative;
overflow: hidden;
}

/* AUTO-HIDE */
.btn-ui { -webkit-transition:opacity .8s; transition:opacity .8s; }
body.ui-hidden .btn-ui { opacity:0 !important; pointer-events:none !important; }

/* FULLSCREEN BTN */
#fsBtn {
display:none; position:absolute; bottom:14px; left:14px;
width:44px; height:44px; background:rgba(255,128,0,.18);
border:1px solid rgba(255,128,0,.5); color:#ff8000;
font-size:22px; border-radius:10px; cursor:pointer; z-index:999;
-webkit-align-items:center; align-items:center;
-webkit-justify-content:center; justify-content:center;
font-family:sans-serif;
}

/* DOTS */
#dots {
position:absolute; left:50%;
-webkit-transform:translateX(-50%); transform:translateX(-50%);
display:-webkit-flex; display:flex;
gap:clamp(8px,2.5vmin,20px); z-index:200; pointer-events:auto; overflow:visible;
}
@media (orientation:portrait) {
#dots { bottom: calc(clamp(12px,3.5vmin,28px) + env(safe-area-inset-bottom, 0px)); top:auto; }
}
@media (orientation:landscape) {
/* Mittig oben — genug Abstand damit Dots nicht am Browser-Rand kleben */
#dots { top: calc(clamp(10px,2.5vmin,20px) + env(safe-area-inset-top, 0px)); bottom:auto; }
}
.dot {
width:  clamp(8px, 1.5vmin, 12px);
height: clamp(8px, 1.5vmin, 12px);
border-radius: 50%;
/* Gefüllt — immer sichtbar auf schwarzem Hintergrund */
background: rgba(255,255,255,.45);
cursor: pointer;
/* Großzügiges Click-Target ohne box-sizing-Tricks */
margin: clamp(8px,2vmin,16px);
-webkit-transition: background .3s, box-shadow .3s;
transition: background .3s, box-shadow .3s;
/* Kein flex-shrink damit Dots nie kollabieren */
-webkit-flex-shrink:0; flex-shrink:0;
}
.dot.active {
background: #ff8000;
box-shadow: 0 0 8px #ff8000, 0 0 16px rgba(255,128,0,.5);
}

/* ══════════════════════════════════════════════════
UHR — Content absolut in sc-main, zentriert
══════════════════════════════════════════════════ */
.uhr-content {
position:absolute; top:0; left:0; right:0; bottom:0;
display:-webkit-flex; display:flex;
-webkit-flex-direction:column; flex-direction:column;
-webkit-align-items:center; align-items:center;
-webkit-justify-content:center; justify-content:center;
padding: 0 2vmin;
}
@media (orientation:landscape) {
/* sc-main ist jetzt auto-height → justify-content spielt keine Rolle mehr,
aber center ist semantisch korrekt */
.uhr-content {
-webkit-justify-content:center; justify-content:center;
padding-bottom: 0;
}
}
.time-row {
display:-webkit-flex; display:flex;
-webkit-align-items:baseline; align-items:baseline;
max-width:96vw; overflow:visible;
}
.time-main {
font-family:‘DIN Condensed’,‘Arial Narrow’,sans-serif;
font-weight:700; letter-spacing:-0.02em;
line-height:1.0;
color:#fff; white-space:nowrap;
/* ── GEÄNDERT: 38vw → 34vw, max 900px → 600px ──
34vw verhindert horizontalen Overflow auf Tablet/Desktop-Portrait.
Auf iPhone (390px): 34vw=133px ≈ gleich wie zuvor.             */
/* Portrait: min(32vw, 44vh)
iPhone (390×844): min(125px, 372px)=125px ✓
iPad   (768×1024): min(246px,451px)=246px ✓ */
font-size: clamp(44px, min(32vw, 44vh), 600px);
}
@media (orientation:landscape) {
/* 24vw: etwas größer als 22vw — mehr Fläche auf iPad/Desktop genutzt
iPhone LS 844×390:  min(202px, 203px) = 202px ✓
iPad LS   1024×768: min(246px, 399px) = 246px ✓
Desktop   1920×1080:min(461px, 562px) = 461px ✓
4K        3840×2160:min(922px,1123px) = 900px (cap) ✓ */
.time-main { font-size: clamp(44px, min(25vw, 52vh), 900px); }
}
.time-sec {
font-family:‘DIN Condensed’,‘Arial Narrow’,sans-serif;
font-weight:700; color:rgba(255,255,255,.52);
line-height:1.0; white-space:nowrap;
/* proportional zu 32vw: 12.5/32 ≈ 39% */
font-size: clamp(18px, min(12.5vw, 17vh), 280px);
padding-left: clamp(2px,min(1.8vw,3vh),18px);
}
@media (orientation:landscape) {
/* 28% von time-main: min(6.7vw, 14vh) — Sekunden dezenter, Hauptziffern dominieren */
.time-sec { font-size: clamp(18px, min(6.7vw, 14vh), 350px); }
}
.date-block {
display:-webkit-flex; display:flex;
gap:2vmin; -webkit-align-items:baseline; align-items:baseline;
margin-top: -0.45em;
white-space:nowrap; -webkit-flex-wrap:nowrap; flex-wrap:nowrap;
}
@media (orientation:landscape) {
.date-block { margin-top: calc(min(25vw, 52vh) * -0.12); }
}
.weekday  { color:rgba(255,255,255,.38); letter-spacing:.4em;
text-transform:uppercase; font-size:clamp(11px,3.6vw,44px); }
.date-txt { color:rgba(255,255,255,.5);  letter-spacing:.2em;
font-size:clamp(11px,3.6vw,44px); }
/* Landscape: Datum-Schrift füllt die Breite der Ziffernzeile
letter-spacing 0.1em (statt 0.4/0.2em Portrait) damit Datum nicht breiter als Ziffern
iPad LS 1024×768:  50px → “DONNERSTAG 19. Mär 2026” ≈ 800px ≈ Ziffernbreite ✓
Desktop 1920×1080: 94px → ≈ 1450px ≈ Ziffernbreite ✓ */
@media (orientation:landscape) {
.weekday, .date-txt {
font-size: clamp(14px, min(4.9vw, 9.5vh), 200px);
letter-spacing: -0.02em;
}
}

/* Uhr-Balken mit seitlichen Markern */
.uhr-bar-wrap {

-webkit-align-items:center; align-items:center;
gap:1.5vmin; width:100%;
}
.bar-marker { width:2px; height:5vmin; min-height:12px;

-webkit-flex-shrink:0; flex-shrink:0; }

.bar-fill {

@keyframes blink          { 0%,100%{opacity:1} 50%{opacity:.1} }

<script>
(function(){
'use strict';
var $ = function(id){ return document.getElementById(id); };
var pad = function(n){ return String(n).padStart(2,'0'); };
var DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

var uhrKeepOn=false, wkKeepOn=false, cdWakeLock=false, cdWlOffT=null;

/* ══════════════════════════════════════════════
   DRUM ENGINE (unchanged)
══════════════════════════════════════════════ */
var IH=48, REPS=41, MID=20;

function createDrum(scrollId,outerId,hlId,count,initVal){
  var sc=$(scrollId),ou=$(outerId),hl=$(hlId);
  sc.innerHTML='';
  var ts=document.createElement('div'); ts.className='drum-spacer'; sc.appendChild(ts);
  for(var r=0;r<REPS;r++){
    for(var v=0;v<count;v++){
      var el=document.createElement('div');
      el.className='drum-item'; el.textContent=pad(v); sc.appendChild(el);
    }
  }
  var bs=document.createElement('div'); bs.className='drum-spacer'; sc.appendChild(bs);

  function applySize(){
    var w=Math.round(IH*2.2);
    ou.style.width=w+'px'; ou.style.height=(IH*3)+'px';
    sc.style.width=w+'px'; sc.style.height=(IH*3)+'px';
    var items=sc.querySelectorAll('.drum-item,.drum-spacer');
    for(var i=0;i<items.length;i++){
      items[i].style.height=IH+'px';
      items[i].style.width=w+'px';
      items[i].style.fontSize=Math.round(IH*0.78)+'px';
    }
    hl.style.top=IH+'px'; hl.style.height=IH+'px';
  }
  function snapTop(v,rep){ return (rep*count+v)*IH; }
  function getVal(){ return ((Math.round(sc.scrollTop/IH)%count)+count)%count; }
  function setVal(v,smooth){
    var sv=((v%count)+count)%count,t=snapTop(sv,MID);
    if(smooth){ try{sc.scrollTo({top:t,behavior:'smooth'});}catch(e){sc.scrollTop=t;} }
    else{ sc.scrollTop=t; }
  }
  var norm=null;
  sc.addEventListener('scroll',function(){
    clearTimeout(norm);
    norm=setTimeout(function(){
      var v=getVal(),t=snapTop(v,MID);
      if(Math.abs(sc.scrollTop-t)>IH*0.5) sc.scrollTop=t;
    },400);
  },false);
  applySize();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ sc.scrollTop=snapTop(initVal,MID); });
  });
  return {getVal:getVal,setVal:setVal,applySize:applySize};
}

var cdH=createDrum('cdHScroll','cdHOuter','cdHhl',25,0);
var cdM=createDrum('cdMScroll','cdMOuter','cdMhl',60,5);
var wkH=createDrum('wkHScroll','wkHOuter','wkHhl',24,7);
var wkM=createDrum('wkMScroll','wkMOuter','wkMhl',60,30);

function updateDrums(){
  var H=$('app').offsetHeight;
  IH=Math.max(38,Math.min(62,Math.round(H*0.08)));
  cdH.applySize(); cdM.applySize(); wkH.applySize(); wkM.applySize();
  var sf=Math.round(IH*0.68);
  [$('cdSep1'),$('cdSep2'),$('wkSep')].forEach(function(e){if(e)e.style.fontSize=sf+'px';});
  setTimeout(function(){
    cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false);
    wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false);
  },60);
}
window.addEventListener('resize',updateDrums,false);

/* ══════════════════════════════════════════════
   WAKE LOCK
══════════════════════════════════════════════ */
var wlSentinel=null;
function wlAcquire(){
  if(!navigator.wakeLock||wlSentinel) return;
  navigator.wakeLock.request('screen').then(function(s){
    wlSentinel=s;
    wlSentinel.addEventListener('release',function(){ wlSentinel=null; },false);
  }).catch(function(){});
}
function wlRelease(){
  if(wlSentinel){ wlSentinel.release().catch(function(){}); wlSentinel=null; }
}
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible') wlUpdate();
},false);
function wlUpdate(){
  var need=uhrKeepOn||cdWakeLock||(wkKeepOn&&wkActive);
  if(need) wlAcquire(); else wlRelease();
}

/* ══════════════════════════════════════════════
   AUTO-HIDE UI
══════════════════════════════════════════════ */
var hideT;
function showUI(){
  clearTimeout(hideT);
  document.body.classList.remove('ui-hidden');
  hideT=setTimeout(function(){ document.body.classList.add('ui-hidden'); },4000);
}
document.addEventListener('mousemove',showUI,false);
document.addEventListener('click',showUI,false);
showUI();

/* ══════════════════════════════════════════════
   SWIPE NAVIGATION
══════════════════════════════════════════════ */
var cur=0,sx=0,sy=0,inDrum=false;
$('app').addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX; sy=e.touches[0].clientY;
  inDrum=!!(e.target.closest&&e.target.closest('.drum-scroller,.picker-box'));
  showUI();
},false);
$('app').addEventListener('touchend',function(e){
  if(inDrum) return;
  if(!$('cdModal').classList.contains('hidden')||!$('wkModal').classList.contains('hidden')) return;
  var dx=e.changedTouches[0].clientX-sx,dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50) goTo(dx<0?cur+1:cur-1);
},false);

function goTo(i){
  i=((i%3)+3)%3;
  var ids=['uhr-screen','countdown-screen','wecker-screen'];
  for(var k=0;k<3;k++){
    if(k===i) $(ids[k]).classList.add('active');
    else      $(ids[k]).classList.remove('active');
  }
  var dots=document.querySelectorAll('.dot');
  for(var d=0;d<dots.length;d++){
    if(d===i) dots[d].classList.add('active');
    else      dots[d].classList.remove('active');
  }
  cur=i; showUI();
}
document.addEventListener('keydown',function(e){
  if(e.key==='ArrowRight') goTo(cur+1);
  else if(e.key==='ArrowLeft') goTo(cur-1);
},false);
(function(){
  var dotEls=document.querySelectorAll('.dot');
  for(var i=0;i<dotEls.length;i++){
    (function(idx){ dotEls[idx].addEventListener('click',function(e){
      e.stopPropagation(); goTo(idx); },false); })(i);
  }
})();

/* ══════════════════════════════════════════════

══════════════════════════════════════════════ */
function tickClock(){
  var now=new Date();
  var p=((now.getSeconds()*1000+now.getMilliseconds())/60000)*100;
  $('timeMain').innerHTML=pad(now.getHours())+'<span class="colon">:</span>'+pad(now.getMinutes());
  $('timeSec').textContent=pad(now.getSeconds());
  $('weekday').textContent=DAYS[now.getDay()];
  $('dateTxt').textContent=pad(now.getDate())+'. '+MONS[now.getMonth()]+' '+now.getFullYear();
  $('barFill').style.width=p+'%';
}

function setCdInfo(txt){ $('cdInfoP').textContent=txt; $('cdInfoL').textContent=txt; }
function setWkInfo(txt){ $('wkInfoP').textContent=txt; $('wkInfoL').textContent=txt; }

/* ══════════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════════ */
var cdTotal=0,cdRemain=0,cdIv=null,cdState='idle';

function cdDisplay(){
  var h=Math.floor(cdRemain/3600),m=Math.floor((cdRemain%3600)/60),s=cdRemain%60;
  $('cdDigits').textContent=pad(h)+':'+pad(m);
  $('cdSec').textContent=pad(s);
  if(cdRemain>0){
    var end=new Date(Date.now()+cdRemain*1000);
    setCdInfo('→ '+pad(end.getHours())+':'+pad(end.getMinutes()));
  }
  var frac=cdTotal>0?cdRemain/cdTotal:0;
  $('cdBarFill').style.width=(frac*100).toFixed(2)+'%';
}

function cdTick(){
  if(cdRemain<=0){
    clearInterval(cdIv); cdIv=null; cdState='idle'; cdRemain=0;
    $('cdBarFill').style.width='0%'; setCdInfo('');
    $('cdDone').classList.remove('hidden');
    $('cdGoBtn').textContent='Stellen';
    clearTimeout(cdWlOffT);
    cdWlOffT=setTimeout(function(){ cdWakeLock=false; wlUpdate(); },5*60*1000);
    return;
  }
  cdRemain--; cdDisplay();
}

function openCdModal(){
  showUI(); $('cdModal').classList.remove('hidden');
  requestAnimationFrame(function(){
    cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false);
  });
}

$('cdGoBtn').addEventListener('click',function(){
  showUI();
  if(cdState==='running'){ clearInterval(cdIv); cdIv=null; cdState='paused'; $('cdGoBtn').textContent='Weiter'; $('cdGoBtnP').textContent='Weiter'; }
  else if(cdState==='paused'){ cdState='running'; $('cdGoBtn').textContent='Pause'; $('cdGoBtnP').textContent='Pause'; cdIv=setInterval(cdTick,1000); }
  else { openCdModal(); }
},false);
$('cdGoBtnP').addEventListener('click',function(){ $('cdGoBtn').click(); },false);
$('cdResetBtnP').addEventListener('click',function(){ $('cdResetBtn').click(); },false);

$('cdInfoP').addEventListener('click',openCdModal,false);
$('cdInfoL').addEventListener('click',openCdModal,false);

$('cdOk').addEventListener('click',function(){
  setTimeout(function(){
    var h=cdH.getVal(),m=cdM.getVal();
    $('cdModal').classList.add('hidden');
    if(h===0&&m===0) return;
    clearInterval(cdIv); cdIv=null;
    cdTotal=h*3600+m*60; cdRemain=cdTotal; cdState='running';
    $('cdDone').classList.add('hidden'); $('cdGoBtn').textContent='Pause';
    clearTimeout(cdWlOffT); cdWakeLock=true; wlUpdate();
    $('cdBarFill').style.transition='none'; $('cdBarFill').style.width='100%';
    requestAnimationFrame(function(){ $('cdBarFill').style.transition=''; cdDisplay(); });
    cdIv=setInterval(cdTick,1000); showUI();
  },150);
},false);

$('cdCancel').addEventListener('click',function(){ $('cdModal').classList.add('hidden'); showUI(); },false);
$('cdModal').addEventListener('click',function(e){
  if(e.target===$('cdModal')){ $('cdModal').classList.add('hidden'); showUI(); }
},false);
$('cdResetBtn').addEventListener('click',function(){
  clearInterval(cdIv); cdIv=null; cdState='idle'; cdTotal=0; cdRemain=0;
  clearTimeout(cdWlOffT); cdWakeLock=false; wlUpdate();
  $('cdGoBtn').textContent='Stellen';
  $('cdDigits').textContent='00:00'; $('cdSec').textContent='00';
  $('cdDone').classList.add('hidden'); setCdInfo('');
  $('cdBarFill').style.width='0%'; showUI();
},false);

/* ══════════════════════════════════════════════
   WECKER
══════════════════════════════════════════════ */
var wkActive=false,wkHval=7,wkMval=30,wkTotalSec=0;
var wkIv=null,wkRinging=false,wkACtx=null,wkSndIv=null;

function secUntilAlarm(h,m){
  var now=new Date(),alarm=new Date(now);
  alarm.setHours(h,m,0,0);
  if(alarm<=now) alarm.setDate(alarm.getDate()+1);
  return Math.max(0,Math.round((alarm-now)/1000));
}

function wkDisplay(){
  if(!wkActive){
    $('wkDigits').textContent='--:--'; $('wkDigits').classList.add('idle');
    $('wkSec').textContent='--'; $('wkBarFill').style.width='0%'; return;
  }
  $('wkDigits').classList.remove('idle');
  var rem=secUntilAlarm(wkHval,wkMval);
  $('wkDigits').textContent=pad(Math.floor(rem/3600))+':'+pad(Math.floor((rem%3600)/60));
  $('wkSec').textContent=pad(rem%60);
  var frac=wkTotalSec>0?rem/wkTotalSec:1;
  $('wkBarFill').style.width=(frac*100).toFixed(2)+'%';
}

function wkBeep(){
  try{
    if(!wkACtx) wkACtx=new(window.AudioContext||window.webkitAudioContext)();
    if(wkACtx.state==='suspended') wkACtx.resume();
    [{f:1047,d:0.00,l:0.11},{f:1047,d:0.16,l:0.11},
     {f:1047,d:0.32,l:0.11},{f:784,d:0.50,l:0.40}].forEach(function(p){
      var o=wkACtx.createOscillator(),g=wkACtx.createGain();
      o.connect(g); g.connect(wkACtx.destination);
      o.frequency.value=p.f; o.type='square';
      var t=wkACtx.currentTime+p.d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.7,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+p.l);
      o.start(t); o.stop(t+p.l+0.02);
    });
  }catch(e){}
}

function triggerAlarm(){
  if(wkRinging) return; wkRinging=true;
  $('alarmTime').textContent=pad(wkHval)+':'+pad(wkMval);
  $('alarmOverlay').classList.remove('hidden');
  wkBeep(); wkSndIv=setInterval(wkBeep,1200);
  try{if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);}catch(e){}
}

function stopAlarm(){
  clearInterval(wkSndIv); wkSndIv=null;
  try{if(wkACtx){wkACtx.close();wkACtx=null;}}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate(0);}catch(e){}
  $('alarmOverlay').classList.add('hidden');
  wkRinging=false; wkActive=false;
  clearInterval(wkIv); wkIv=null;
  $('wkSetBtn').textContent='Stellen'; $('wkSetBtn').classList.remove('armed');
  $('wkSetBtnP').textContent='Stellen'; $('wkSetBtnP').classList.remove('armed');
  setWkInfo('');
  $('wkDigits').textContent='--:--'; $('wkDigits').classList.add('idle');
  $('wkSec').textContent='--'; $('wkBarFill').style.width='0%';
  wlUpdate(); showUI();
}

function wkTick(){
  if(!wkActive||wkRinging) return;
  wkDisplay();
  var now=new Date();
  if(now.getHours()===wkHval&&now.getMinutes()===wkMval&&now.getSeconds()===0) triggerAlarm();
}

function openWkModal(){
  showUI(); $('wkModal').classList.remove('hidden');
  requestAnimationFrame(function(){
    wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false);
  });
}

$('wkInfoP').addEventListener('click',openWkModal,false);
$('wkInfoL').addEventListener('click',openWkModal,false);
$('wkSetBtn').addEventListener('click',function(){ showUI(); if(wkActive){stopAlarm();return;} openWkModal(); },false);
$('wkSetBtnP').addEventListener('click',function(){ $('wkSetBtn').click(); },false);
$('wkResetBtnP').addEventListener('click',function(){ $('wkResetBtn').click(); },false);

$('wkOk').addEventListener('click',function(){
  setTimeout(function(){
    var h=wkH.getVal(),m=wkM.getVal();
    $('wkModal').classList.add('hidden');
    var rem=secUntilAlarm(h,m);
    if(rem<30){ $('wkMsg').textContent='Mind. 1 Min. in der Zukunft!'; $('wkMsg').classList.remove('hidden'); return; }
    if(wkActive){ clearInterval(wkIv); wkIv=null; wkActive=false; }
    wkHval=h; wkMval=m; wkTotalSec=rem; wkActive=true;
    $('wkSetBtn').textContent='Aktiv ✓'; $('wkSetBtn').classList.add('armed');
    $('wkSetBtnP').textContent='Aktiv ✓'; $('wkSetBtnP').classList.add('armed');
    setWkInfo('Alarm '+pad(h)+':'+pad(m));
    $('wkMsg').classList.add('hidden'); wlUpdate();
    $('wkBarFill').style.transition='none'; $('wkBarFill').style.width='100%';
    requestAnimationFrame(function(){ $('wkBarFill').style.transition=''; wkDisplay(); });
    clearInterval(wkIv); wkIv=setInterval(wkTick,1000); showUI();
  },150);
},false);

$('wkCancel').addEventListener('click',function(){ $('wkModal').classList.add('hidden'); showUI(); },false);
$('wkModal').addEventListener('click',function(e){
  if(e.target===$('wkModal')){ $('wkModal').classList.add('hidden'); showUI(); }
},false);
$('wkResetBtn').addEventListener('click',function(){ stopAlarm(); $('wkMsg').classList.add('hidden'); },false);
$('alarmOverlay').addEventListener('click',stopAlarm,false);
$('alarmOverlay').addEventListener('touchstart',function(e){e.preventDefault();stopAlarm();},false);

/* ══════════════════════════════════════════════
   WAKE LOCK TOGGLE BUTTONS
══════════════════════════════════════════════ */
function initWlBtn(btnId,getState,setState){
  var btn=$(btnId); if(!btn) return;
  function refresh(){
    if(getState()){ btn.classList.add('on'); btn.textContent='● Anbleiben'; }
    else           { btn.classList.remove('on'); btn.textContent='Anbleiben'; }
  }
  btn.addEventListener('click',function(){ setState(!getState()); wlUpdate(); refresh(); showUI(); },false);
  refresh();
}
initWlBtn('uhrWlBtn',function(){ return uhrKeepOn; },function(v){ uhrKeepOn=v; });
initWlBtn('wkWlBtn', function(){ return wkKeepOn; }, function(v){ wkKeepOn=v; });

/* ══════════════════════════════════════════════
   FULLSCREEN — Android only
══════════════════════════════════════════════ */
(function(){
  var btn=$('fsBtn');
  var canFS=!!(document.fullscreenEnabled||document.webkitFullscreenEnabled);
  if(canFS&&btn){
    btn.style.display='-webkit-flex'; btn.style.display='flex';
    var inFS=false;
    btn.addEventListener('click',function(){
      try{
        var el=document.documentElement;
        if(!inFS){ var req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen; if(req){req.call(el);} }
        else{ var ex=document.exitFullscreen||document.webkitExitFullscreen; if(ex){ex.call(document);} }
      }catch(e){} showUI();
    },false);
    function onFSChange(){
      inFS=!!(document.fullscreenElement||document.webkitFullscreenElement);
      if(inFS){ btn.style.display='none'; }
      else{ btn.style.display='-webkit-flex'; btn.style.display='flex'; btn.textContent='⛶'; }
    }
    document.addEventListener('fullscreenchange',onFSChange,false);
    document.addEventListener('webkitfullscreenchange',onFSChange,false);
  }
})();

   INIT
══════════════════════════════════════════════ */
updateDrums();
function loop(){ tickClock(); requestAnimationFrame(loop); }
loop();

})();
