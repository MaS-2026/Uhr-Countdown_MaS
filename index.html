html, body {
  width:100%; height:100%;
  background:#000 !important; color:#fff !important;
  overflow:hidden; font-family:'Share Tech Mono',monospace;
  user-select:none; -webkit-user-select:none;
}

.screen {
  width:100vw; height:100vh; display:none;
  flex-direction:column; align-items:center; justify-content:center;
  position:relative; background:#000 !important;
}
.screen.active { display:flex; }

/* ══ FIXED BUTTONS ══ */
.switch-btn {
  position:fixed; bottom:14px; right:14px;
  background:rgba(255,128,0,0.15); border:1px solid rgba(255,128,0,0.5);
  color:#ff8000; font-family:'Share Tech Mono',monospace;
  font-size:10px; letter-spacing:2px; padding:7px 12px; border-radius:16px;
  cursor:pointer; z-index:999; text-transform:uppercase;
}
#fsBtn {
  position:fixed; bottom:14px; left:14px;
  background:rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.4); font-size:16px; width:34px; height:34px;
  border-radius:8px; cursor:pointer; display:flex; align-items:center;
  justify-content:center; z-index:999;
}

/* ══ UHR ══ */
#clock-screen { flex-direction:column; padding:12px; }

.time-row { display:flex; align-items:flex-end; flex-shrink:0; }

.time-main {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; letter-spacing:-2px; line-height:1; color:#fff;
  white-space:nowrap;
}
.time-sec {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,0.42); line-height:1;
  white-space:nowrap;
}

.date-block {
  display:flex; gap:12px; align-items:baseline;
  margin-top:6px; flex-shrink:0;
}
.weekday  { font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.36); letter-spacing:5px; text-transform:uppercase; }
.date-txt { font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.48); letter-spacing:2px; }

.progress-bar-wrap {
  width:94%; margin-top:12px; display:flex; align-items:center;
  gap:6px; flex-shrink:0;
}
.bar-marker { width:2px; height:18px; background:rgba(255,255,255,0.35); border-radius:1px; flex-shrink:0; }
.progress-bar-container { flex:1; height:12px; background:rgba(255,255,255,0.07); border-radius:6px; position:relative; overflow:hidden; }
.progress-bar {
  position:absolute; top:0; left:0; height:100%; width:0%;
  background:#ff8000; box-shadow:0 0 16px #ff8000,0 0 32px rgba(255,128,0,0.4); border-radius:6px;
}

.colon { animation:blink 1s step-end infinite; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.1} }

/* ══ COUNTDOWN – GEMEINSAM ══ */
.ring-wrap {
  position:relative; flex-shrink:0;
  display:flex; align-items:center; justify-content:center;
}
.ring-wrap svg { width:100%; height:100%; transform:rotate(-90deg); }
.ring-bg { fill:none; stroke:rgba(255,128,0,0.12); }
.ring-fg {
  fill:none; stroke:#ff8000; stroke-linecap:round;
  filter:drop-shadow(0 0 10px #ff8000);
  transition:stroke-dashoffset 0.25s linear;
}
.cd-center {
  position:absolute; inset:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
}
.cd-digits {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:#fff; line-height:1; letter-spacing:-1px;
  white-space:nowrap;
}
.cd-label {
  font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.35);
  letter-spacing:4px; text-transform:uppercase; margin-top:4px;
}

/* ══ COUNTDOWN – PORTRAIT ══ */
@media (orientation:portrait) {
  #countdown-screen { flex-direction:column; align-items:center; justify-content:center; }
  .cd-controls {
    display:flex; flex-direction:column; align-items:center; gap:10px; margin-top:14px;
  }
  .btn-row { display:flex; flex-direction:row; align-items:center; gap:10px; }
}

/* ══ COUNTDOWN – LANDSCAPE ══ */
@media (orientation:landscape) {
  #countdown-screen { flex-direction:row; align-items:center; justify-content:center; }
  .cd-controls {
    position:fixed; right:14px; top:50%; transform:translateY(-55%);
    display:flex; flex-direction:column; align-items:center; gap:8px; z-index:10;
  }
  .btn-row { display:flex; flex-direction:row; align-items:center; gap:6px; }
}

/* Controls */
.pick-display { display:flex; flex-direction:column; align-items:center; justify-content:center; }
.pick-val {
  font-family:'DIN Condensed',sans-serif; font-weight:700; color:#fff;
  text-align:center; line-height:1; font-size:clamp(24px,6vmin,56px); min-width:44px;
}
.pick-unit-lbl {
  font-family:'Share Tech Mono',monospace; color:rgba(255,255,255,0.4);
  letter-spacing:3px; text-transform:uppercase; font-size:10px; margin-top:2px;
}
.pick-btn {
  background:rgba(255,128,0,0.15); border:1px solid rgba(255,128,0,0.4); color:#ff8000;
  font-family:'DIN Condensed',sans-serif; font-weight:700;
  border-radius:9px; cursor:pointer;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  line-height:1; gap:1px;
  width:clamp(38px,6vmin,52px); height:clamp(34px,5.5vmin,48px);
}
.btn-num  { font-size:clamp(14px,3vmin,20px); }
.btn-unit { font-size:clamp(7px,1.2vmin,9px); opacity:0.75; letter-spacing:1px; }

.cd-btn {
  font-family:'Share Tech Mono',monospace; letter-spacing:2px; text-transform:uppercase;
  border-radius:16px; cursor:pointer; border:none;
  font-size:clamp(9px,1.6vmin,12px); padding:clamp(6px,1.2vmin,10px) clamp(12px,2.5vmin,20px);
}
.cd-btn.start { background:#ff8000; color:#000; box-shadow:0 0 14px rgba(255,128,0,0.5); }
.cd-btn.reset { background:rgba(255,255,255,0.07); border:1px solid rgba(255,255,255,0.2); color:#fff; }

.cd-done {
  font-family:'Share Tech Mono',monospace; color:#ff8000;
  letter-spacing:3px; text-transform:uppercase; text-align:center;
  font-size:clamp(9px,2vmin,16px);
  animation:pulse 1s ease-in-out infinite alternate;
}
.cd-done.hidden { display:none; }
@keyframes pulse { from{opacity:0.3} to{opacity:1} }

  </div>

<button class="switch-btn" id="switchBtn">⏱ Countdown</button>
<button id="fsBtn">⛶</button>

  <script>
    const $ = id => document.getElementById(id);
    const pad = n => String(n).padStart(2,'0');
    const WEEKDAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
    const MONTHS   = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

    /* ── Dynamische Größenanpassung ── */
    function resize() {
      const W = window.innerWidth;
      const H = window.innerHeight;
      const portrait = H > W;

      // ── UHR: Schriftgröße dynamisch berechnen ──
      // Verfügbare Höhe: minus Datum (~5%), Balken (~5%), padding
      const availH = H * 0.78;
      const availW = W * 0.96;

      // DIN Condensed: ca. 0.52 Breite pro Zeichen bei HH:MM (5 Zeichen)
      // Sekunden daneben: ca. 2 Zeichen bei 43% der Hauptgröße
      // Gesamtbreite ≈ fontSize * (5*0.52 + 2*0.52*0.43) = fontSize * 3.05
      let fs;
      if (portrait) {
        // Breite ist limitierend
        fs = Math.floor(availW / 3.05);
        // Höhe prüfen
        fs = Math.min(fs, Math.floor(availH * 0.82));
      } else {
        // Höhe ist limitierend
        fs = Math.floor(availH * 0.88);
        // Breite prüfen
        fs = Math.min(fs, Math.floor(availW / 3.05));
      }
      fs = Math.max(fs, 40); // Minimum

      $('timeMain').style.fontSize = fs + 'px';
      $('timeSec').style.fontSize  = Math.round(fs * 0.43) + 'px';
      $('timeSec').style.paddingBottom = Math.round(fs * 0.08) + 'px';
      $('timeSec').style.paddingLeft   = Math.round(fs * 0.05) + 'px';

      // Datum & Wochentag: ~4% der Hauptgröße, min 11px
      const dateFs = Math.max(11, Math.round(fs * 0.11));
      $('dateBlock').style.fontSize = dateFs + 'px';
      $('dateBlock').querySelectorAll('span').forEach(s => s.style.fontSize = dateFs + 'px');

      // ── COUNTDOWN RING ──
      const ctrlW = portrait ? 0 : 140; // Breite der fixierten Controls rechts
      const ringAvailW = (W - ctrlW) * 0.94;
      const ringAvailH = portrait ? H * 0.58 : H * 0.92;
      const ringSize = Math.floor(Math.min(ringAvailW, ringAvailH));

      $('ringWrap').style.width  = ringSize + 'px';
      $('ringWrap').style.height = ringSize + 'px';

      // Ziffern im Ring: ~28% der Ringgröße
      const cdFs = Math.round(ringSize * 0.28);
      $('cdDigits').style.fontSize = cdFs + 'px';
      $('cdLabel').style.fontSize  = Math.round(cdFs * 0.14) + 'px';
    }

    window.addEventListener('resize', resize);
    resize(); // Initial

    /* ── Uhr ── */
    function tickClock() {
      const now = new Date();
      const p = ((now.getSeconds()*1000+now.getMilliseconds())/60000)*100;
      $('timeMain').innerHTML = `${pad(now.getHours())}<span class="colon">:</span>${pad(now.getMinutes())}`;
      $('timeSec').textContent = pad(now.getSeconds());
      $('weekday').textContent = WEEKDAYS[now.getDay()];
      $('dateTxt').textContent = `${pad(now.getDate())}. ${MONTHS[now.getMonth()]} ${now.getFullYear()}`;
      $('progressBar').style.width = p + '%';
    }

    /* ── Countdown ── */
    const CIRC = 2 * Math.PI * 88;
    let cdMin=5, cdTotal=0, cdRemain=0, cdIv=null, cdRun=false;
    const updPick = () => $('pickVal').textContent = cdMin;
    const updRing = f => $('ringFg').style.strokeDashoffset = CIRC*(1-f);
    function updCd() {
      $('cdDigits').textContent = `${pad(Math.floor(cdRemain/60))}:${pad(cdRemain%60)}`;
      updRing(cdTotal > 0 ? cdRemain/cdTotal : 1);
    }
    function cdTick() {
      if (cdRemain <= 0) {
        clearInterval(cdIv); cdRun=false; cdRemain=0;
        updCd(); $('cdDone').classList.remove('hidden');
        $('cdStart').textContent = 'Start'; return;
      }
      cdRemain--; updCd();
    }
    $('minMinus').onclick  = () => { if(!cdRun && cdMin>1)  { cdMin--;             updPick(); } };
    $('minPlus').onclick   = () => { if(!cdRun && cdMin<99) { cdMin++;             updPick(); } };
    $('min5Minus').onclick = () => { if(!cdRun) { cdMin=Math.max(1,  cdMin-5);    updPick(); } };
    $('min5Plus').onclick  = () => { if(!cdRun) { cdMin=Math.min(99, cdMin+5);    updPick(); } };

    $('cdStart').onclick = () => {
      if (cdRun) { clearInterval(cdIv); cdRun=false; $('cdStart').textContent='Weiter'; }
      else {
        if (cdRemain===0) { cdTotal=cdMin*60; cdRemain=cdTotal; $('cdDone').classList.add('hidden'); }
        cdRun=true; $('cdStart').textContent='Pause';
        updCd(); cdIv=setInterval(cdTick,1000);
      }
    };
    $('cdReset').onclick = () => {
      clearInterval(cdIv); cdRun=false; cdRemain=0; cdTotal=0;
      $('cdStart').textContent='Start'; $('cdDigits').textContent='00:00';
      $('cdDone').classList.add('hidden'); updRing(1);
    };
    updRing(1); updPick();

    /* ── Screen Switch ── */
    let onClock = true;
    $('switchBtn').onclick = () => {
      onClock = !onClock;
      $('clock-screen').classList.toggle('active', onClock);
      $('countdown-screen').classList.toggle('active', !onClock);
      $('switchBtn').textContent = onClock ? '⏱ Countdown' : '🕐 Uhr';
      resize();
    };

    /* ── Vollbild ── */
    $('fsBtn').onclick = () => {
      try {
        const el = document.documentElement;
        const reqFS = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
        const exitFS = document.exitFullscreen || document.webkitExitFullscreen;
        const isFS = document.fullscreenElement || document.webkitFullscreenElement;
        if (!isFS && reqFS) { reqFS.call(el); $('fsBtn').textContent='✕'; }
        else if (isFS && exitFS) { exitFS.call(document); $('fsBtn').textContent='⛶'; }
      } catch(e) {}
    };

    /* ── Hauptloop ── */
    function loop() { if(onClock) tickClock(); requestAnimationFrame(loop); }
    loop();
  </script>
