/* ══════════════════════════════════════════════

#app {
  position: fixed;
  top:0; left:0; right:0; bottom:0;
  overflow:hidden;

  color:#fff;
  font-family:'Share Tech Mono', monospace;
  -webkit-transform:translateZ(0);

  top:0; left:0; right:0; bottom:0;
  display:none;
  background:#000;
}

  display:-webkit-flex;
  display:flex;
  -webkit-align-items:center;      align-items:center;

/*
 * CLOCK SIZING STRATEGY
 * ─────────────────────
 * min(41vw, 68vh) covers both orientations without a media query:
 *
 *   Portrait  (375×812) : min(154px, 552px) = 154px
 *     "00:00" ≈ 154 × 1.85 em = 285px  ← fits in 375px ✓
 *
 *   Landscape (812×375) : min(333px, 255px) = 255px
 *     "00:00" ≈ 255 × 1.85 em = 472px  ← fits in 812px ✓ (was 142px before!)
 *
 *   Landscape tablet (1024×768) : min(419px, 522px) = 419px
 *     "00:00" ≈ 419 × 1.85 em = 775px  ← fits in 1024px ✓
 *
 * Seconds use ~39 % of that size, same dual-axis constraint.
*/
.time-main {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; letter-spacing:-0.02em; line-height:1;
  color:#fff; white-space:nowrap;
  font-size: clamp(44px, min(28vw, 65vh), 700px);
}
.time-sec {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,.52);
  line-height:1; white-space:nowrap;
  font-size:  clamp(18px, min(11vw, 26vh), 280px);
  padding-left: clamp(2px, min(1.8vw, 3vh), 18px);
}
.date-block {
  display:-webkit-flex; display:flex;
  gap:2vmin; -webkit-align-items:baseline; align-items:baseline;
  margin-top:0.4vmin;
  white-space:nowrap;
  -webkit-flex-wrap:nowrap; flex-wrap:nowrap;
}
.weekday  { color:rgba(255,255,255,.38); letter-spacing:.4em;
            text-transform:uppercase; font-size:clamp(11px, 3.6vw, 44px);
            white-space:nowrap; }
.date-txt { color:rgba(255,255,255,.5); letter-spacing:.2em;
            font-size:clamp(11px, 3.6vw, 44px);
            white-space:nowrap; }
.progress-bar-wrap {
  margin-top:2vmin;
  display:-webkit-flex; display:flex;
  -webkit-align-items:center; align-items:center;
  gap:1.5vmin;
  width: clamp(200px, 94vw, 1400px);
}
.bar-marker { width:2px; height:5vmin; min-height:12px;
              background:rgba(255,255,255,.32); border-radius:1px;
              -webkit-flex-shrink:0; flex-shrink:0; }
.bar-track  { flex:1; height:clamp(12px,3vmin,22px);
              background:rgba(255,255,255,.07); border-radius:6px;
              position:relative; overflow:hidden; }
.bar-fill   { position:absolute; top:0; left:0; bottom:0; width:0%;
              background:#ff8000;
              box-shadow:0 0 10px #ff8000, 0 0 28px rgba(255,128,0,.7), 0 0 50px rgba(255,128,0,.3);
              border-radius:6px; }
.colon { -webkit-animation:blink 1s step-end infinite;
                 animation:blink 1s step-end infinite; }
@-webkit-keyframes blink { 0%,100%{opacity:1} 50%{opacity:.1} }
@keyframes blink          { 0%,100%{opacity:1} 50%{opacity:.1} }

.ring-wrap {

.ring-wrap svg {

.ring-bg { fill:none; stroke:rgba(255,128,0,.12); stroke-width:10; }
.ring-fg {
  stroke-width:10;
  fill:none; stroke:#ff8000; stroke-linecap:round;
  -webkit-filter:drop-shadow(0 0 8px #ff8000) drop-shadow(0 0 20px rgba(255,128,0,.6));
          filter:drop-shadow(0 0 8px #ff8000) drop-shadow(0 0 20px rgba(255,128,0,.6));

  -webkit-justify-content:center; justify-content:center;
}

/*
 * RING DIGITS SIZING
 * ──────────────────
 * Ring inner clear diameter = (r − stroke/2) / r_total × ring_size
 *   = (88 − 5) / 100 × ring_size = 83 % of ring-wrap side.
 * "00:00" in DIN Condensed (letter-spacing −.02em) ≈ 2.45 em wide.
 * Safety factor 0.92 → max_fs = 0.83 × 0.92 / 2.45 × ring ≈ 0.312 × ring.
 *
 * min(24vw, 29vh) gives:
 *   Portrait  375×812 : min( 90, 235) =  90px  →  220px < 286px inner ✓
 *   Landscape 812×375 : min(195, 108) = 108px  →  265px < 292px inner ✓
 *   Tablet    1024×768: min(246, 222) = 222px  →  544px < 599px inner ✓
*/
.ring-digits.idle {
  font-family:'Share Tech Mono',monospace !important;
  font-size: clamp(16px, min(14vw, 18vh), 130px) !important;
  color:rgba(255,255,255,.28);
}
.ring-digits {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:#fff; line-height:1;

  font-size: clamp(20px, min(22vw, 27vh), 200px);
}
.ring-sec {
  font-family:'DIN Condensed','Arial Narrow',sans-serif;
  font-weight:700; color:rgba(255,255,255,.62);

}
.ring-label {
  font-family:'Share Tech Mono',monospace;
  color:rgba(255,255,255,.28); letter-spacing:.4em;
  text-transform:uppercase; margin-top:.8vmin;
  font-size: clamp(8px, min(3.5vw, 4.6vh), 30px);
}
.ring-sub {
  font-family:'DIN Condensed',sans-serif; font-weight:700;
  color:rgba(255,128,0,.78); letter-spacing:.3em;
  margin-top:1vmin; cursor:pointer;

.ring-sublbl {

        <div class="ring-sec"    id="wkSec">--</div>
        <div class="ring-label">wecker</div>
        <div class="ring-sublbl" id="wkLbl">weckzeit</div>
        <div class="ring-sub"    id="wkSub">--:--</div>
      </div>
    </div>
    <div class="side-panel btn-ui">
      <div class="btn-row">
        <button class="act-btn act-set"   id="wkSetBtn">Stellen</button>
        <button class="act-btn act-reset" id="wkResetBtn">Reset</button>
      </div>
      <div class="info-msg hidden" id="wkInfo">–</div>
      <button class="wl-btn btn-ui" id="wkWlBtn" style="position:relative;top:auto;right:auto;">Anbleiben</button>
    </div>
  </div>

  <!-- COUNTDOWN PICKER -->

  <div class="picker-modal hidden" id="cdModal">
    <div class="picker-box">
      <div class="picker-title">Countdown einstellen</div>
      <div class="drums-row">
        <div class="drum-wrap">
          <div class="drum-outer" id="cdHOuter">
            <div class="drum-hl" id="cdHhl"></div>
            <div class="drum-fade"></div>
            <div class="drum-scroller" id="cdHScroll"></div>
          </div>
          <div class="drum-lbl">Stunden</div>
        </div>
        <div class="drum-sep" id="cdSep1">h</div>
        <div class="drum-wrap">
          <div class="drum-outer" id="cdMOuter">
            <div class="drum-hl" id="cdMhl"></div>
            <div class="drum-fade"></div>
            <div class="drum-scroller" id="cdMScroll"></div>
          </div>
          <div class="drum-lbl">Minuten</div>
        </div>
        <div class="drum-sep" id="cdSep2">m</div>
      </div>
      <div style="display:-webkit-flex;display:flex;gap:3vmin">
        <button class="picker-ok"     id="cdOk">Start</button>
        <button class="picker-cancel" id="cdCancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- WECKER PICKER -->

  <div class="picker-modal hidden" id="wkModal">
    <div class="picker-box">
      <div class="picker-title">Weckzeit einstellen</div>
      <div class="drums-row">
        <div class="drum-wrap">
          <div class="drum-outer" id="wkHOuter">
            <div class="drum-hl" id="wkHhl"></div>
            <div class="drum-fade"></div>
            <div class="drum-scroller" id="wkHScroll"></div>
          </div>
          <div class="drum-lbl">Stunde</div>
        </div>
        <div class="drum-sep" id="wkSep">:</div>
        <div class="drum-wrap">
          <div class="drum-outer" id="wkMOuter">
            <div class="drum-hl" id="wkMhl"></div>
            <div class="drum-fade"></div>
            <div class="drum-scroller" id="wkMScroll"></div>
          </div>
          <div class="drum-lbl">Minute</div>
        </div>
      </div>
      <div style="display:-webkit-flex;display:flex;gap:3vmin">
        <button class="picker-ok"     id="wkOk">OK</button>
        <button class="picker-cancel" id="wkCancel">Abbrechen</button>
      </div>
    </div>
  </div>

  <!-- ALARM -->

  <div id="alarmOverlay" class="hidden">
    <div class="a-title">Achtung!</div>
    <div class="a-time" id="alarmTime"></div>
    <div class="a-hint">Tippen zum Stoppen</div>
  </div>

  <!-- FULLSCREEN (Android only) -->

<button id="fsBtn" title="Vollbild">⛶</button>

  <!-- DOTS -->

  <div id="dots" class="btn-ui">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

</div><!-- /#app -->

<script>
(function(){
'use strict';
var $ = function(id){ return document.getElementById(id); };
var pad = function(n){ return String(n).padStart(2,'0'); };
var CIRC = 2 * Math.PI * 88;
var DAYS = ['Sonntag','Montag','Dienstag','Mittwoch','Donnerstag','Freitag','Samstag'];
var MONS = ['Jan','Feb','Mär','Apr','Mai','Jun','Jul','Aug','Sep','Okt','Nov','Dez'];

/* WAKE LOCK TOGGLE STATE */
var uhrKeepOn = false;
var wkKeepOn  = false;
var cdWakeLock = false;  // true while countdown running + 5min after
var cdWlOffT   = null;   // timer for 5-min post-countdown release

/* ══════════════════════════════════════════
   DRUM ENGINE
══════════════════════════════════════════ */
var IH = 48, REPS = 41, MID = 20;

function createDrum(scrollId, outerId, hlId, count, initVal) {
  var sc=$(scrollId), ou=$(outerId), hl=$(hlId);

  sc.innerHTML='';
  var ts=document.createElement('div'); ts.className='drum-spacer'; sc.appendChild(ts);
  for (var r=0;r<REPS;r++) {
    for (var v=0;v<count;v++) {
      var el=document.createElement('div');
      el.className='drum-item'; el.textContent=pad(v); sc.appendChild(el);
    }
  }
  var bs=document.createElement('div'); bs.className='drum-spacer'; sc.appendChild(bs);

  function applySize() {
    var w=Math.round(IH*2.2);
    ou.style.width=w+'px'; ou.style.height=(IH*3)+'px';
    sc.style.width=w+'px'; sc.style.height=(IH*3)+'px';
    var items=sc.querySelectorAll('.drum-item,.drum-spacer');
    for (var i=0;i<items.length;i++) {
      items[i].style.height=IH+'px';
      items[i].style.width=w+'px';
      items[i].style.fontSize=Math.round(IH*0.78)+'px';
    }
    hl.style.top=IH+'px'; hl.style.height=IH+'px';
  }

  function snapTop(v,rep){ return (rep*count+v)*IH; }
  function getVal(){ return ((Math.round(sc.scrollTop/IH)%count)+count)%count; }
  function setVal(v,smooth){
    var sv=((v%count)+count)%count, t=snapTop(sv,MID);
    if(smooth){ try{sc.scrollTo({top:t,behavior:'smooth'});}catch(e){sc.scrollTop=t;} }
    else{ sc.scrollTop=t; }
  }

  var norm=null;
  sc.addEventListener('scroll',function(){
    clearTimeout(norm);
    norm=setTimeout(function(){
      var v=getVal(), t=snapTop(v,MID);
      if(Math.abs(sc.scrollTop-t)>IH*0.5) sc.scrollTop=t;
    },400);
  },false);

  applySize();
  requestAnimationFrame(function(){
    requestAnimationFrame(function(){ sc.scrollTop=snapTop(initVal,MID); });
  });
  return {getVal:getVal, setVal:setVal, applySize:applySize};
}

var cdH=createDrum('cdHScroll','cdHOuter','cdHhl',25,0);
var cdM=createDrum('cdMScroll','cdMOuter','cdMhl',60,5);
var wkH=createDrum('wkHScroll','wkHOuter','wkHhl',24,7);
var wkM=createDrum('wkMScroll','wkMOuter','wkMhl',60,30);

/* ══════════════════════════════════════════
   RESIZE
══════════════════════════════════════════ */
function updateDrums() {
  var H=$('app').offsetHeight;
  IH=Math.max(38,Math.min(62,Math.round(H*0.08)));
  cdH.applySize(); cdM.applySize(); wkH.applySize(); wkM.applySize();
  var sf=Math.round(IH*0.68);
  [$('cdSep1'),$('cdSep2'),$('wkSep')].forEach(function(e){if(e)e.style.fontSize=sf+'px';});
  setTimeout(function(){
    cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false);
    wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false);
  },60);
}

window.addEventListener('resize', updateDrums, false);

/* ══════════════════════════════════════════
   WAKE LOCK
   Acquires/releases screen wake lock.
   Called whenever relevant state changes.
══════════════════════════════════════════ */
var wlSentinel = null;

function wlAcquire(){
  if(!navigator.wakeLock) return;
  if(wlSentinel) return;
  navigator.wakeLock.request('screen').then(function(s){
    wlSentinel = s;
    wlSentinel.addEventListener('release', function(){ wlSentinel = null; }, false);
  }).catch(function(){});
}
function wlRelease(){
  if(wlSentinel){ wlSentinel.release().catch(function(){}); wlSentinel = null; }
}
// Re-acquire after tab becomes visible again (iOS/Android release on hide)
document.addEventListener('visibilitychange', function(){
  if(document.visibilityState === 'visible') wlUpdate();
}, false);

function wlUpdate(){
  var need = uhrKeepOn || cdWakeLock || (wkKeepOn && wkActive);
  if(need) wlAcquire(); else wlRelease();
}

/* ══════════════════════════════════════════
   AUTO-HIDE UI
══════════════════════════════════════════ */
var hideT;
function showUI(){
  clearTimeout(hideT);
  document.body.classList.remove('ui-hidden');
  hideT=setTimeout(function(){ document.body.classList.add('ui-hidden'); },4000);
}
document.addEventListener('mousemove',showUI,false);
document.addEventListener('click',showUI,false);
showUI();

/* ══════════════════════════════════════════
   SWIPE NAVIGATION
══════════════════════════════════════════ */
var cur=0, sx=0, sy=0, inDrum=false;
$('app').addEventListener('touchstart',function(e){
  sx=e.touches[0].clientX; sy=e.touches[0].clientY;
  inDrum=!!(e.target.closest&&e.target.closest('.drum-scroller,.picker-box'));
  showUI();
},false);
$('app').addEventListener('touchend',function(e){
  if(inDrum) return;
  if(!$('cdModal').classList.contains('hidden')||!$('wkModal').classList.contains('hidden')) return;
  var dx=e.changedTouches[0].clientX-sx, dy=e.changedTouches[0].clientY-sy;
  if(Math.abs(dx)>Math.abs(dy)*1.5&&Math.abs(dx)>50) goTo(dx<0?cur+1:cur-1);
},false);

function goTo(i){
  i=((i%3)+3)%3;
  var ids=['uhr-screen','countdown-screen','wecker-screen'];
  for(var k=0;k<3;k++){
    if(k===i) $(ids[k]).classList.add('active');
    else      $(ids[k]).classList.remove('active');
  }
  var dots=document.querySelectorAll('.dot');
  for(var d=0;d<dots.length;d++){
    if(d===i) dots[d].classList.add('active');
    else      dots[d].classList.remove('active');
  }
  cur=i; showUI();
}

/* DOT CLICK NAVIGATION */
(function(){
  var dotEls=document.querySelectorAll('.dot');
  for(var i=0;i<dotEls.length;i++){
    (function(idx){ dotEls[idx].addEventListener('click',function(e){
      e.stopPropagation(); goTo(idx); },false); })(i);
  }
})();

/* RING HELPER */
function setRing(id,f){ $(id).style.strokeDashoffset=CIRC*(1-Math.max(0,Math.min(1,f))); }
setRing('cdRingFg',1); setRing('wkRingFg',1);

/* ══════════════════════════════════════════
   CLOCK
══════════════════════════════════════════ */
function tickClock(){
  var now=new Date();
  var p=((now.getSeconds()*1000+now.getMilliseconds())/60000)*100;
  $('timeMain').innerHTML=pad(now.getHours())+'<span class="colon">:</span>'+pad(now.getMinutes());
  $('timeSec').textContent=pad(now.getSeconds());
  $('weekday').textContent=DAYS[now.getDay()];
  $('dateTxt').textContent=pad(now.getDate())+'. '+MONS[now.getMonth()]+' '+now.getFullYear();
  $('barFill').style.width=p+'%';
}

/* ══════════════════════════════════════════
   COUNTDOWN
══════════════════════════════════════════ */
var cdTotal=0,cdRemain=0,cdIv=null,cdState='idle';

function cdDisplay(){
  var h=Math.floor(cdRemain/3600),m=Math.floor((cdRemain%3600)/60),s=cdRemain%60;
  $('cdDigits').textContent=pad(h)+':'+pad(m);
  $('cdSec').textContent=pad(s);
  if(cdRemain>0){
    var end=new Date(Date.now()+cdRemain*1000);
    $('cdSub').textContent='→ '+pad(end.getHours())+':'+pad(end.getMinutes());
    $('cdSub').classList.remove('hidden');
  }
  setRing('cdRingFg',cdTotal>0?cdRemain/cdTotal:1);
}
function cdTick(){
  if(cdRemain<=0){
    clearInterval(cdIv);cdIv=null;cdState='idle';cdRemain=0;
    cdDisplay();$('cdDone').classList.remove('hidden');
    $('cdGoBtn').textContent='Stellen';$('cdSub').classList.add('hidden');
    // Keep screen on for 5 more minutes after countdown ends
    clearTimeout(cdWlOffT);
    cdWlOffT = setTimeout(function(){ cdWakeLock=false; wlUpdate(); }, 5*60*1000);
    return;
  }
  cdRemain--;cdDisplay();
}
function openCdModal(){
  showUI();$('cdModal').classList.remove('hidden');
  requestAnimationFrame(function(){ cdH.setVal(cdH.getVal(),false); cdM.setVal(cdM.getVal(),false); });
}

$('cdGoBtn').addEventListener('click',function(){
  showUI();
  if(cdState==='running'){clearInterval(cdIv);cdIv=null;cdState='paused';$('cdGoBtn').textContent='Weiter';}
  else if(cdState==='paused'){cdState='running';$('cdGoBtn').textContent='Pause';cdIv=setInterval(cdTick,1000);}
  else{openCdModal();}
},false);
$('cdSub').addEventListener('click',openCdModal,false);
$('cdOk').addEventListener('click',function(){
  setTimeout(function(){
    var h=cdH.getVal(),m=cdM.getVal();
    $('cdModal').classList.add('hidden');
    if(h===0&&m===0) return;
    clearInterval(cdIv);cdIv=null;
    cdTotal=h*3600+m*60;cdRemain=cdTotal;cdState='running';
    $('cdDone').classList.add('hidden');$('cdGoBtn').textContent='Pause';
    clearTimeout(cdWlOffT);cdWakeLock=true;wlUpdate();
    cdDisplay();cdIv=setInterval(cdTick,1000);showUI();
  },150);
},false);
$('cdCancel').addEventListener('click',function(){$('cdModal').classList.add('hidden');showUI();},false);
$('cdModal').addEventListener('click',function(e){
  if(e.target===$('cdModal')){$('cdModal').classList.add('hidden');showUI();}
},false);
$('cdResetBtn').addEventListener('click',function(){
  clearInterval(cdIv);cdIv=null;cdState='idle';cdTotal=0;cdRemain=0;
  clearTimeout(cdWlOffT);cdWakeLock=false;wlUpdate();
  $('cdGoBtn').textContent='Stellen';$('cdDigits').textContent='00:00';$('cdSec').textContent='00';
  $('cdDone').classList.add('hidden');$('cdSub').classList.add('hidden');
  setRing('cdRingFg',1);showUI();
},false);

/* ══════════════════════════════════════════
   WECKER
══════════════════════════════════════════ */
var wkActive=false,wkHval=7,wkMval=30,wkTotalSec=0;
var wkIv=null,wkRinging=false,wkACtx=null,wkSndIv=null;

function secUntilAlarm(h,m){
  var now=new Date(),alarm=new Date(now);
  alarm.setHours(h,m,0,0);
  if(alarm<=now) alarm.setDate(alarm.getDate()+1);
  return Math.max(0,Math.round((alarm-now)/1000));
}
function wkDisplay(){
  if(!wkActive){
    $('wkDigits').textContent='--:--';$('wkDigits').classList.add('idle');
    $('wkSec').textContent='--';setRing('wkRingFg',1);return;
  }
  $('wkDigits').classList.remove('idle');
  var rem=secUntilAlarm(wkHval,wkMval);
  $('wkDigits').textContent=pad(Math.floor(rem/3600))+':'+pad(Math.floor((rem%3600)/60));
  $('wkSec').textContent=pad(rem%60);
  setRing('wkRingFg',wkTotalSec>0?rem/wkTotalSec:1);
}
function wkBeep(){
  try{
    if(!wkACtx) wkACtx=new(window.AudioContext||window.webkitAudioContext)();
    if(wkACtx.state==='suspended') wkACtx.resume();
    // Attention: 3 short sharp beeps + 1 long
    [{f:1047,d:0.00,l:0.11},{f:1047,d:0.16,l:0.11},
     {f:1047,d:0.32,l:0.11},{f:784, d:0.50,l:0.40}].forEach(function(p){
      var o=wkACtx.createOscillator(),g=wkACtx.createGain();
      o.connect(g);g.connect(wkACtx.destination);
      o.frequency.value=p.f; o.type='square';
      var t=wkACtx.currentTime+p.d;
      g.gain.setValueAtTime(0,t);
      g.gain.linearRampToValueAtTime(0.7,t+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+p.l);
      o.start(t);o.stop(t+p.l+0.02);
    });
  }catch(e){}
}
function triggerAlarm(){
  if(wkRinging) return; wkRinging=true;
  $('alarmTime').textContent=pad(wkHval)+':'+pad(wkMval);
  $('alarmOverlay').classList.remove('hidden');
  wkBeep(); wkSndIv=setInterval(wkBeep,1200);
  try{if(navigator.vibrate)navigator.vibrate([500,200,500,200,500]);}catch(e){}
}
function stopAlarm(){
  clearInterval(wkSndIv);wkSndIv=null;
  try{if(wkACtx){wkACtx.close();wkACtx=null;}}catch(e){}
  try{if(navigator.vibrate)navigator.vibrate(0);}catch(e){}
  $('alarmOverlay').classList.add('hidden');
  wkRinging=false;wkActive=false;
  clearInterval(wkIv);wkIv=null;
  $('wkSetBtn').textContent='Stellen';$('wkSetBtn').classList.remove('armed');
  $('wkSub').textContent='--:--';$('wkDigits').textContent='--:--';$('wkDigits').classList.add('idle');$('wkSec').textContent='--';
  setRing('wkRingFg',1);wlUpdate();showUI();
}
function wkTick(){
  if(!wkActive||wkRinging) return; wkDisplay();
  var now=new Date();
  if(now.getHours()===wkHval&&now.getMinutes()===wkMval&&now.getSeconds()===0) triggerAlarm();
}
function openWkModal(){
  showUI();$('wkModal').classList.remove('hidden');
  requestAnimationFrame(function(){ wkH.setVal(wkH.getVal(),false); wkM.setVal(wkM.getVal(),false); });
}
$('wkLbl').addEventListener('click',openWkModal,false);
$('wkSub').addEventListener('click',openWkModal,false);
$('wkSetBtn').addEventListener('click',function(){showUI();if(wkActive){stopAlarm();return;}openWkModal();},false);
$('wkOk').addEventListener('click',function(){
  setTimeout(function(){
    var h=wkH.getVal(),m=wkM.getVal();
    $('wkModal').classList.add('hidden');
    var rem=secUntilAlarm(h,m);
    if(rem<30){$('wkInfo').textContent='Mind. 1 Min. in der Zukunft!';$('wkInfo').classList.remove('hidden');return;}
    if(wkActive){clearInterval(wkIv);wkIv=null;wkActive=false;}
    wkHval=h;wkMval=m;wkTotalSec=rem;wkActive=true;
    $('wkSetBtn').textContent='Aktiv ✓';$('wkSetBtn').classList.add('armed');
    $('wkSub').textContent=pad(h)+':'+pad(m);
    $('wkInfo').classList.add('hidden');
    wlUpdate();
    wkDisplay();clearInterval(wkIv);wkIv=setInterval(wkTick,1000);showUI();
  },150);
},false);
$('wkCancel').addEventListener('click',function(){$('wkModal').classList.add('hidden');showUI();},false);
$('wkModal').addEventListener('click',function(e){
  if(e.target===$('wkModal')){$('wkModal').classList.add('hidden');showUI();}
},false);
$('wkResetBtn').addEventListener('click',function(){stopAlarm();$('wkInfo').classList.add('hidden');},false);
$('alarmOverlay').addEventListener('click',stopAlarm,false);
$('alarmOverlay').addEventListener('touchstart',function(e){e.preventDefault();stopAlarm();},false);

/* ══════════════════════════════════════════
   WAKE LOCK TOGGLE BUTTONS
══════════════════════════════════════════ */
function initWlBtn(btnId, getState, setState){
  var btn = $(btnId);
  if(!btn) return;
  function refresh(){
    if(getState()){ btn.classList.add('on'); btn.textContent='● Anbleiben'; }
    else           { btn.classList.remove('on'); btn.textContent='Anbleiben'; }
  }
  btn.addEventListener('click', function(){
    setState(!getState());
    wlUpdate(); refresh(); showUI();
  }, false);
  refresh();
}
initWlBtn('uhrWlBtn',
  function(){ return uhrKeepOn; },
  function(v){ uhrKeepOn = v; }
);
initWlBtn('wkWlBtn',
  function(){ return wkKeepOn; },
  function(v){ wkKeepOn = v; }
);

/* ══════════════════════════════════════════
   FULLSCREEN — Android only
══════════════════════════════════════════ */
(function(){
  var btn = $('fsBtn');
  var canFS = !!(document.fullscreenEnabled || document.webkitFullscreenEnabled);

  if (canFS && btn) {
    btn.style.display = '-webkit-flex';
    btn.style.display = 'flex';
    var inFS = false;
    btn.addEventListener('click', function(){
      try {
        var el = document.documentElement;
        if (!inFS) {
          var req = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen;
          if (req) { req.call(el); }
        } else {
          var ex = document.exitFullscreen || document.webkitExitFullscreen;
          if (ex) { ex.call(document); }
        }
      } catch(e) {}
      showUI();
    }, false);

    function onFSChange() {
      inFS = !!(document.fullscreenElement || document.webkitFullscreenElement);
      if (inFS) {
        btn.style.display = 'none';
      } else {
        btn.style.display = '-webkit-flex';
        btn.style.display = 'flex';
        btn.textContent = '⛶';
      }
    }
    document.addEventListener('fullscreenchange', onFSChange, false);
    document.addEventListener('webkitfullscreenchange', onFSChange, false);
  }
})();

/* ══════════════════════════════════════════
   INIT
══════════════════════════════════════════ */
updateDrums();
function loop(){ tickClock(); requestAnimationFrame(loop); }
loop();

})();
</script>

</body>
